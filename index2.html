<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAN | Internal Affairs Dashboard</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/hHQgKs9.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#4f46e5',
                        dark: '#0f172a',
                        'dark-lighter': '#1e293b',
                        accent: '#10b981'
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts: Inter & Outfit -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-[#f1f5f9] dark:bg-[#020617] text-slate-800 dark:text-slate-200 antialiased font-['Inter']; }
            h1, h2, h3, .font-heading { @apply font-['Outfit']; }
        }
        @layer components {
            .glass { @apply bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border border-white/20 dark:border-slate-800; }
            .card-sidebar { @apply transition-all duration-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl px-4 py-3 flex items-center gap-3 text-slate-500 dark:text-slate-400 font-medium cursor-pointer; }
            .card-sidebar.active { @apply bg-indigo-600 text-white shadow-lg shadow-indigo-200 dark:shadow-indigo-900/20; }
            .stat-card { @apply bg-white dark:bg-[#0B1224] p-6 rounded-3xl border border-slate-100 dark:border-white/5 shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none hover:shadow-[0_20px_50px_rgba(99,102,241,0.12)] hover:-translate-y-2 transition-all duration-500 relative; }
            .btn-primary { @apply bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-semibold transition-all shadow-lg shadow-indigo-100 dark:shadow-indigo-900/30 hover:shadow-indigo-200 active:scale-95 flex items-center justify-center gap-2; }
            .input-modern { @apply w-full bg-slate-50 dark:bg-[#050914] border border-slate-200 dark:border-white/5 rounded-xl px-4 py-3 focus:bg-white dark:focus:bg-[#0B1224] focus:ring-4 focus:ring-indigo-100 dark:focus:ring-indigo-900/30 focus:border-indigo-400 dark:focus:border-indigo-500 outline-none transition-all; }
            .chart-container { @apply bg-white dark:bg-[#0B1224] p-8 md:p-10 rounded-[48px] border border-slate-100 dark:border-white/5 shadow-[0_10px_40px_rgba(0,0,0,0.03)] dark:shadow-none hover:shadow-[0_20px_60px_rgba(79,70,229,0.08)] transition-all duration-700; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { @apply bg-slate-200 rounded-full hover:bg-slate-300; }
        
        .chart-glow {
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.2));
        }
        .stat-glow {
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.05);
        }
        .main-gradient {
            background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(79, 70, 229, 0.02) 0%, transparent 50%);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const supabaseUrl = 'https://kllfgqviatusjerecemj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsbGZncXZpYXR1c2plcmVjZW1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NjQ3ODUsImV4cCI6MjA4NzA0MDc4NX0.naHtlVQQdnTiwtfuyRLdyJnws-qu6ky8mnYdOkKwk2E';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        const Icon = ({ name, className = "", ...props }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && name) {
                    ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({ targets: [ref.current] });
                }
            }, [name]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} {...props}></span>;
        };

        // --- Utils ---
        const getWeekRange = (dateObj = new Date()) => {
            const date = new Date(dateObj.getTime());
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(date.setDate(diff));
            const sunday = new Date(monday.getTime()); sunday.setDate(monday.getDate() + 6);
            return `${monday.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })} - ${sunday.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}`;
        };

        const getRankLabel = (rank) => {
            const labels = {
                10: "CEO/VICE CEO/COMMISSIONER",
                9: "General Manager",
                8: "Manager",
                7: "Vice Manager",
                6: "Exe. Producer",
                5: "Producer",
                4: "Supervisor",
                3: "Senior Staff",
                2: "Jr.Staff",
                1: "Internship"
            };
            return labels[rank] || "Staff";
        };

        const generateWeeks = (year) => {
            const weeks = [];
            // Find first Monday of the year (on or before Jan 1)
            let date = new Date(year, 0, 1);
            const day = date.getDay();
            const diff = day === 0 ? -6 : 1 - day;
            date.setDate(date.getDate() + diff);
            let weekNum = 1;
            // Generate all weeks until we pass end of year
            while (date.getFullYear() <= year) {
                const monday = new Date(date);
                const sunday = new Date(date);
                sunday.setDate(sunday.getDate() + 6);
                const label = `Minggu ${weekNum} \u2022 ${monday.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' })} - ${sunday.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}`;
                weeks.push(label);
                date.setDate(date.getDate() + 7);
                weekNum++;
            }
            return weeks;
        };

        // Get label for the week containing today (same format as generateWeeks)
        const getCurrentWeek = () => {
            const today = new Date();
            const year = today.getFullYear();
            // Find first Monday of the year
            const jan1 = new Date(year, 0, 1);
            const jan1Day = jan1.getDay();
            const firstMonday = new Date(jan1);
            firstMonday.setDate(firstMonday.getDate() + (jan1Day === 0 ? -6 : 1 - jan1Day));
            // Find this week's Monday
            const todayDay = today.getDay();
            const thisMonday = new Date(today);
            thisMonday.setDate(thisMonday.getDate() + (todayDay === 0 ? -6 : 1 - todayDay));
            const weekNum = Math.round((thisMonday - firstMonday) / (7 * 24 * 60 * 60 * 1000)) + 1;
            const sunday = new Date(thisMonday);
            sunday.setDate(sunday.getDate() + 6);
            return `Minggu ${weekNum} \u2022 ${thisMonday.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' })} - ${sunday.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}`;
        };

        // Extract week number from week label (either new 'Minggu X •' format or legacy date-range format)
        const getWeekNum = (weekStr) => {
            if (!weekStr) return null;
            // New format: 'Minggu 9 • ...' 
            const m = weekStr.match(/Minggu (\d+)/);
            if (m) return parseInt(m[1]);
            // Legacy format: try to parse start date 'dd Mon yyyy'
            try {
                const parts = weekStr.split(' - ')[0].trim().split(' ');
                const months = { jan: 0, feb: 1, mar: 2, apr: 3, mei: 4, jun: 5, jul: 6, agu: 7, sep: 8, okt: 9, nov: 10, des: 11 };
                const d = parseInt(parts[0]), mo = months[(parts[1] || '').toLowerCase()], y = parseInt(parts[2]);
                if (!isNaN(d) && mo !== undefined && !isNaN(y)) {
                    const start = new Date(y, mo, d);
                    const jan1 = new Date(y, 0, 1);
                    const jan1Day = jan1.getDay();
                    const firstMon = new Date(jan1);
                    firstMon.setDate(firstMon.getDate() + (jan1Day === 0 ? -6 : 1 - jan1Day));
                    return Math.round((start - firstMon) / (7 * 24 * 60 * 60 * 1000)) + 1;
                }
            } catch (e) { }
            return null;
        };

        // --- App Component ---
        const App = () => {
            const [loginEmail, setLoginEmail] = useState("");
            const [loginPass, setLoginPass] = useState("");
            const [activeScreen, setActiveScreen] = useState("dashboard");
            const [toast, setToast] = useState(null);
            const [isInitialLoading, setIsInitialLoading] = useState(true);

            // Admin / Role States (Table-Only Auth)
            const [currentUserEmail, setCurrentUserEmail] = useState(() => localStorage.getItem('sa_email') || '');
            const [userRole, setUserRole] = useState(() => localStorage.getItem('sa_role') || '');
            const [userDisplayName, setUserDisplayName] = useState(() => localStorage.getItem('sa_name') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem('sa_email'));

            const isGM = userRole === 'gm';
            const isRank10 = userRole === 'rank10';
            const isAdmin = isGM || isRank10;

            // User management
            const [adminUsers, setAdminUsers] = useState([]);
            const [adminUsersLoading, setAdminUsersLoading] = useState(false);
            const [showAddUserModal, setShowAddUserModal] = useState(false);
            const [newUserEmail, setNewUserEmail] = useState('');
            const [newUserName, setNewUserName] = useState('');
            const [newUserPass, setNewUserPass] = useState(''); // New password field
            const [newUserRole, setNewUserRole] = useState('rank10');
            const [removingUserId, setRemovingUserId] = useState(null);

            // Change own password
            const [showChangePassModal, setShowChangePassModal] = useState(false);
            const [newPass, setNewPass] = useState('');
            const [confirmPass, setConfirmPass] = useState('');
            const [showNewPass, setShowNewPass] = useState(false);
            const [showConfirmPass, setShowConfirmPass] = useState(false);

            // Reset other user password (by Admin)
            const [showResetModal, setShowResetModal] = useState(false);
            const [resetTargetEmail, setResetTargetEmail] = useState('');
            const [resetNewPass, setResetNewPass] = useState('');

            // UI Tabs & Views
            const [activeTab, setActiveTab] = useState("all"); // "all", "warning"
            const [isMasterView, setIsMasterView] = useState(false);
            const [showReductionModal, setShowReductionModal] = useState(null); // stores member name
            const [reductionReason, setReductionReason] = useState("");
            const [showEditStaffModal, setShowEditStaffModal] = useState(null); // stores member object
            const [editStaffData, setEditStaffData] = useState({ badge: '', name: '', rank: '' });
            const [showHistoryModal, setShowHistoryModal] = useState(null); // stores member object

            // Auto-fetch admin data if logged in as admin
            useEffect(() => {
                if (isLoggedIn && isAdmin) fetchAdminUsers();
            }, [isLoggedIn, userRole]);

            // Dark Mode State
            const [isDarkMode, setIsDarkMode] = useState(() => {
                const isD = localStorage.getItem('santhem') === 'dark';
                if (isD) document.documentElement.classList.add('dark');
                return isD;
            });

            const toggleTheme = () => {
                setIsDarkMode(prev => {
                    const next = !prev;
                    if (next) document.documentElement.classList.add('dark');
                    else document.documentElement.classList.remove('dark');
                    localStorage.setItem('santhem', next ? 'dark' : 'light');
                    return next;
                });
            };

            // Data States
            const [savedWeeks, setSavedWeeks] = useState([]);
            const [activeWeek, setActiveWeek] = useState("");
            const [members, setMembers] = useState([]);
            const [stats, setStats] = useState({ total: 0, active: 0, inactive: 0, disciplined: 0, melanggar: 0 });
            const [rankStats, setRankStats] = useState({
                hc: { t: 0, a: 0 },
                cmd: { t: 0, a: 0 },
                spv: { t: 0, a: 0 },
                staff: { t: 0, a: 0 },
                intern: { t: 0, a: 0 }
            });
            const [selectedMember, setSelectedMember] = useState(null);
            const [topDuty, setTopDuty] = useState([]);

            // Search & Sort
            const [searchTerm, setSearchTerm] = useState("");
            const [sort, setSort] = useState({ key: 'name', dir: 'asc' });

            // Calendar
            const [calYear, setCalYear] = useState(new Date().getFullYear());
            const [availableWeeks, setAvailableWeeks] = useState([]);
            const [targetWeek, setTargetWeek] = useState("");
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const chartRefs = useRef({});

            // --- Effects ---
            useEffect(() => {
                const initData = async () => {
                    // Fetch Weeks
                    const { data: weeksData } = await sb.from('san_sessions').select('week_name');
                    if (weeksData && weeksData.length > 0) {
                        const wks = weeksData.map(w => w.week_name).filter(w => w !== 'MASTER_DB').sort((a, b) => (getWeekNum(a) || 0) - (getWeekNum(b) || 0));
                        setSavedWeeks(wks);
                        const last = wks.length > 0 ? wks[wks.length - 1] : 'MASTER_DB';
                        const { data: sessionData } = await sb.from('san_sessions').select('members').eq('week_name', last).single();
                        if (sessionData) setMembers(sessionData.members || []);
                        setActiveWeek(last);
                    }
                    setIsInitialLoading(false);
                };
                initData();
            }, []);

            useEffect(() => {
                const wks = generateWeeks(calYear);
                setAvailableWeeks(wks);
                // Default to the current real-world week if in selected year, else first week
                const currentYr = new Date().getFullYear();
                if (calYear === currentYr) {
                    const nowWeek = getCurrentWeek();
                    setTargetWeek(wks.includes(nowWeek) ? nowWeek : wks[0]);
                } else {
                    setTargetWeek(wks[0]);
                }
            }, [calYear]);

            useEffect(() => {
                if (isInitialLoading || !activeWeek) return;

                const sorted = [...members].sort((a, b) => (b.currentDuty || 0) - (a.currentDuty || 0));
                setTopDuty(sorted.slice(0, 3));

                let a = 0, i = 0, d = 0, m = 0;
                let rs = {
                    hc: { t: 0, a: 0 },
                    cmd: { t: 0, a: 0 },
                    spv: { t: 0, a: 0 },
                    staff: { t: 0, a: 0 },
                    intern: { t: 0, a: 0 }
                };

                members.forEach(p => {
                    const rStr = (p.rank || '').toLowerCase();
                    const rNum = parseInt(rStr.match(/\d+/)?.[0] || 0);
                    const isActive = p.currentDuty >= 200;

                    if (isActive) a++; else i++;
                    const exempt = rNum >= 9;
                    if (!exempt) {
                        if ((p.ip || 0) === 0) d++; else m++;
                    }

                    let group = null;
                    if (rNum >= 9) group = 'hc';
                    else if (rNum >= 6) group = 'cmd';
                    else if (rNum === 4 || rNum === 5 || (rNum === 3 && rStr.includes('prob'))) group = 'spv';
                    else if (rNum === 2 || rNum === 3) group = 'staff';
                    else if (rNum === 1) group = 'intern';

                    if (group) {
                        rs[group].t++;
                        if (isActive) rs[group].a++;
                    }
                });
                setStats({ total: members.length, active: a, inactive: i, disciplined: d, melanggar: m });
                setRankStats(rs);

                const syncData = async () => {
                    // Only sync if it's the current/active week or the MASTER_DB
                    // We don't want to accidentally overwrite historical records if just viewing
                    if (isLoggedIn && (activeWeek === 'MASTER_DB' || activeWeek === savedWeeks[savedWeeks.length - 1])) {
                        const { error } = await sb.from('san_sessions').upsert({ week_name: activeWeek, members: members }, { onConflict: 'week_name' });
                        if (error) console.error("Sync Error:", error);
                    }
                };
                syncData();
            }, [members, activeWeek, isLoggedIn, savedWeeks]);

            // Charts
            useEffect(() => {
                if (!isLoggedIn || stats.total === 0) return;

                Chart.register(ChartDataLabels);

                const dark = document.documentElement.classList.contains('dark');
                const gridColor = dark ? 'rgba(255,255,255,0.06)' : '#e2e8f0';
                const tickColor = dark ? '#64748b' : '#64748b';
                const barLabelColor = dark ? '#e2e8f0' : '#1e293b';
                const legendColor = dark ? '#94a3b8' : '#64748b';

                const createChart = (id, type, data, colors, isPie = true) => {
                    const ctx = document.getElementById(id);
                    if (!ctx) return;

                    if (chartRefs.current[id]) chartRefs.current[id].destroy();

                    // Generate one specific color per bar if type is bar and colors is an array
                    const finalColors = !isPie && Array.isArray(colors) ? colors.slice(0, data.values.length) : colors;

                    const datasets = [{
                        data: data.values,
                        backgroundColor: finalColors,
                        hoverBackgroundColor: finalColors,
                        borderRadius: isPie ? 0 : 4,
                        borderWidth: isPie ? 1 : 0,
                        borderColor: '#ffffff',
                        barThickness: isPie ? undefined : 60,
                        hoverOffset: isPie ? 5 : 0,
                    }];

                    chartRefs.current[id] = new Chart(ctx, {
                        type,
                        data: {
                            labels: data.labels,
                            datasets: datasets
                        },
                        plugins: [ChartDataLabels],
                        options: {
                            indexAxis: 'x',
                            responsive: true,
                            maintainAspectRatio: false,
                            layout: {
                                padding: isPie ? { top: 10, bottom: 10 } : { top: 30, bottom: 5, left: -5, right: 0 }
                            },
                            animation: {
                                duration: 1500,
                                easing: 'easeOutQuart'
                            },
                            plugins: {
                                legend: {
                                    display: isPie,
                                    position: 'bottom',
                                    labels: {
                                        usePointStyle: false,
                                        boxWidth: 14,
                                        boxHeight: 14,
                                        padding: 25,
                                        font: { size: 13, weight: '500', family: "'Inter', sans-serif" },
                                        color: legendColor
                                    }
                                },
                                tooltip: {
                                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                                    backdropFilter: 'blur(12px)',
                                    padding: 16,
                                    titleFont: { size: 14, weight: 'bold', family: "'Outfit'" },
                                    bodyFont: { size: 13, weight: '500', family: "'Inter'" },
                                    cornerRadius: 12,
                                    displayColors: true,
                                },
                                datalabels: {
                                    color: isPie ? '#ffffff' : barLabelColor,
                                    anchor: isPie ? 'center' : 'end',
                                    align: isPie ? 'center' : 'end',
                                    offset: isPie ? 0 : 4,
                                    font: {
                                        weight: 'bold',
                                        size: isPie ? 18 : 13,
                                        family: "'Inter', sans-serif"
                                    },
                                    formatter: (value) => {
                                        if (isPie) return value;
                                        return value + 'm';
                                    }
                                }
                            },
                            scales: isPie ? {
                                x: { display: false },
                                y: { display: false }
                            } : {
                                y: {
                                    beginAtZero: true,
                                    border: { display: false },
                                    grid: { color: gridColor, drawBorder: false },
                                    ticks: { color: tickColor, font: { size: 12 }, padding: 8, maxTicksLimit: 6 }
                                },
                                x: {
                                    border: { display: false },
                                    grid: { display: false },
                                    ticks: { color: tickColor, font: { size: 13 }, padding: 8 }
                                }
                            }
                        }
                    });
                };

                const paletteKeaktifan = ['#22c55e', '#ef4444'];
                const paletteDisiplin = ['#3b82f6', '#f97316'];
                const paletteTop3 = ['#fbbf24', '#9ca3af', '#d97706'];

                createChart('chart1', 'pie', { labels: ['≥ 200m (Aktif)', '< 200m (Tidak Aktif)'], values: [stats.active, stats.inactive] }, paletteKeaktifan, true);
                createChart('chart2', 'pie', { labels: ['Disiplin (0 IP)', 'Melanggar (>0 IP)'], values: [stats.disciplined, stats.melanggar] }, paletteDisiplin, true);
                createChart('chart3', 'bar', { labels: topDuty.map(t => (t.name || '').split(' ')[0]), values: topDuty.map(t => t.currentDuty || 0) }, paletteTop3, false);
            }, [stats, topDuty, isLoggedIn, activeScreen, rankStats, isDarkMode]);

            // --- Handlers ---
            const showToast = (msg, type = 'success') => { setToast({ msg, type }); setTimeout(() => setToast(null), 3000); };

            const downloadChart = (chartId, filename) => {
                const canvas = document.getElementById(chartId);
                if (!canvas) return showToast("Gagal mengunduh diagram", "error");

                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const ctx = tempCanvas.getContext('2d');

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                ctx.drawImage(canvas, 0, 0);

                const link = document.createElement('a');
                link.download = filename + '.png';
                link.href = tempCanvas.toDataURL('image/png', 1.0);
                link.click();
                showToast("Diagram berhasil diunduh");
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                // Simple Login: Check email AND password in san_user_accounts table
                const { data: user, error } = await sb.from('san_user_accounts')
                    .select('*')
                    .eq('email', loginEmail.trim().toLowerCase())
                    .eq('password', loginPass) // Direct password check
                    .eq('is_active', true)
                    .single();

                if (error || !user) {
                    showToast("Email atau Password salah, atau akun tidak aktif.", "error");
                    return;
                }

                // Set states
                setCurrentUserEmail(user.email);
                setUserRole(user.role);
                setUserDisplayName(user.display_name);
                setIsLoggedIn(true);

                // Persist
                localStorage.setItem('sa_email', user.email);
                localStorage.setItem('sa_role', user.role);
                localStorage.setItem('sa_name', user.display_name);

                showToast("Login Berhasil");
            };

            const fetchAdminUsers = async () => {
                setAdminUsersLoading(true);
                const { data } = await sb.from('san_user_accounts').select('*').order('created_at', { ascending: true });
                setAdminUsers(data || []);
                setAdminUsersLoading(false);
            };

            const handleAddUser = async () => {
                if (!newUserEmail.trim() || !newUserName.trim() || !newUserPass.trim()) return showToast('Semua field wajib diisi!', 'error');

                // Restriction: GM cannot create Rank 10
                if (isGM && newUserRole === 'rank10') return showToast('GM tidak diizinkan membuat akun dengan role Rank 10!', 'error');

                const { error } = await sb.from('san_user_accounts').insert({
                    email: newUserEmail.trim().toLowerCase(),
                    display_name: newUserName.trim(),
                    password: newUserPass.trim(),
                    role: newUserRole,
                    is_active: true
                });
                if (error) { showToast('Gagal menambah user: ' + error.message, 'error'); return; }
                showToast('User berhasil ditambahkan!');
                setShowAddUserModal(false);
                setNewUserEmail(''); setNewUserName(''); setNewUserPass(''); setNewUserRole(isGM ? 'gm' : 'rank10');
                fetchAdminUsers();
            };

            const handleRemoveUser = async (id, email) => {
                if (email === currentUserEmail) return showToast('Tidak bisa menghapus akun sendiri!', 'error');

                // Restriction: GM cannot remove Rank 10
                const targetUser = adminUsers.find(u => u.id === id);
                if (isGM && targetUser?.role === 'rank10') return showToast('GM tidak diizinkan menghapus akun Rank 10!', 'error');

                setRemovingUserId(id);
                const { error } = await sb.from('san_user_accounts').delete().eq('id', id);
                if (error) showToast('Gagal menghapus: ' + error.message, 'error');
                else { showToast('User dihapus'); fetchAdminUsers(); }
                setRemovingUserId(null);
            };

            const handleToggleUserActive = async (id, currentStatus) => {
                // Restriction: GM cannot toggle Rank 10
                const targetUser = adminUsers.find(u => u.id === id);
                if (isGM && targetUser?.role === 'rank10') return showToast('GM tidak diizinkan mengubah status akun Rank 10!', 'error');

                const { error } = await sb.from('san_user_accounts').update({ is_active: !currentStatus }).eq('id', id);
                if (error) showToast('Gagal update: ' + error.message, 'error');
                else { showToast(currentStatus ? 'Akun dinonaktifkan' : 'Akun diaktifkan'); fetchAdminUsers(); }
            };

            const handleChangeOwnPassword = async () => {
                if (!newPass || newPass.length < 6) return showToast('Password minimal 6 karakter!', 'error');
                if (newPass !== confirmPass) return showToast('Konfirmasi password tidak cocok!', 'error');

                // Update password in the custom table
                const { error } = await sb.from('san_user_accounts')
                    .update({ password: newPass })
                    .eq('email', currentUserEmail);

                if (error) showToast('Gagal: ' + error.message, 'error');
                else {
                    showToast('Password berhasil diubah!');
                    setShowChangePassModal(false);
                    setNewPass(''); setConfirmPass('');
                }
            };

            const handleResetUserPassword = async () => {
                if (!resetNewPass || resetNewPass.length < 6) return showToast('Password minimal 6 karakter!', 'error');

                // Restriction: GM cannot reset Rank 10
                const targetUser = adminUsers.find(u => u.email === resetTargetEmail);
                if (isGM && targetUser?.role === 'rank10') return showToast('GM tidak diizinkan mereset password akun Rank 10!', 'error');

                const { error } = await sb.from('san_user_accounts').update({ password: resetNewPass }).eq('email', resetTargetEmail);
                if (error) showToast('Gagal reset: ' + error.message, 'error');
                else {
                    showToast(`Password ${resetTargetEmail} berhasil diubah!`);
                    setShowResetModal(false);
                    setResetNewPass('');
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('sa_email');
                localStorage.removeItem('sa_role');
                localStorage.removeItem('sa_name');
                setIsLoggedIn(false);
                setCurrentUserEmail('');
                setUserRole('');
                setUserDisplayName('');
            };

            const handleDeleteWeek = async () => {
                if (!activeWeek || activeWeek === 'MASTER_DB') return;

                const confirmMsg = `Apakah Anda yakin ingin menghapus seluruh data untuk periode "${activeWeek}"? \n\nTindakan ini akan menghapus data permanen dari database dan tidak dapat dibatalkan.`;
                if (!confirm(confirmMsg)) return;

                setIsInitialLoading(true);
                const { error } = await sb.from('san_sessions').delete().eq('week_name', activeWeek);

                if (error) {
                    showToast("Gagal menghapus periode: " + error.message, "error");
                    setIsInitialLoading(false);
                } else {
                    const deletedWeek = activeWeek;
                    const newWeeks = savedWeeks.filter(w => w !== deletedWeek);
                    setSavedWeeks(newWeeks);

                    showToast("Periode berhasil dihapus secara permanen");

                    // Determine next week to show
                    const nextWeek = newWeeks.length > 0 ? newWeeks[newWeeks.length - 1] : 'MASTER_DB';
                    setActiveWeek(nextWeek);
                    setIsMasterView(nextWeek === 'MASTER_DB');

                    // Fetch data for the new active week
                    const { data: session } = await sb.from('san_sessions').select('members').eq('week_name', nextWeek).single();
                    if (session) {
                        setMembers(session.members || []);
                    } else if (nextWeek === 'MASTER_DB') {
                        // If Master DB was empty or error, set to empty array just in case
                        setMembers([]);
                    }
                    setIsInitialLoading(false);
                }
            };

            const handleFileUpload = (type, e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    const data = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });

                    if (type === 'members') {
                        const h = Object.keys(json[0] || {});
                        const bK = h.find(k => /badge/i.test(k)) || h[0];
                        const nK = h.find(k => /name|nama/i.test(k)) || h[1];
                        const rK = h.find(k => /rank|pangkat/i.test(k)) || h[2];

                        const newList = json.map(r => ({ badge: String(r[bK]), name: String(r[nK]).trim(), rank: String(r[rK]) })).filter(m => m.name);

                        // Smart Sync: Match by Name
                        let updatedMembers = [...members];

                        // If Master View, remove those not in new file
                        if (isMasterView) {
                            const newNames = newList.map(n => n.name.toLowerCase());
                            updatedMembers = updatedMembers.filter(m => newNames.includes(m.name.toLowerCase()));
                        }

                        newList.forEach(newItem => {
                            const idx = updatedMembers.findIndex(m => m.name.toLowerCase() === newItem.name.toLowerCase());
                            if (idx > -1) {
                                // Update Rank and Badge
                                updatedMembers[idx] = { ...updatedMembers[idx], rank: newItem.rank, badge: newItem.badge };
                            } else {
                                // Add new
                                updatedMembers.push({ ...newItem, ip: 0, currentDuty: 0, ipHistory: [] });
                            }
                        });

                        setMembers(updatedMembers);

                        if (!isMasterView) {
                            if (targetWeek !== 'MASTER_DB' && !savedWeeks.includes(targetWeek)) {
                                const newW = [...savedWeeks, targetWeek].sort((a, b) => (getWeekNum(a) || 0) - (getWeekNum(b) || 0));
                                setSavedWeeks(newW);
                                localStorage.setItem('san_weeks', JSON.stringify(newW));
                            }
                            setActiveWeek(targetWeek);
                        }
                        showToast(isMasterView ? "Database Master Disinkronisasi" : "Data Member Diimpor");
                    } else {
                        if (members.length === 0) return showToast("Upload Members Dulu", "error");
                        const h = Object.keys(json[0] || {});
                        const nK = h.find(k => /Staff|nama/i.test(k)) || h[0];
                        const dK = h.find(k => /duty/i.test(k)) || h[2];
                        const map = {};
                        json.forEach(r => {
                            const n = (r[nK] || '').toString().toLowerCase().trim();
                            const d = parseInt((r[dK] || '0').toString().replace(/\D/g, '')) || 0;
                            if (n) map[n] = (map[n] || 0) + d;
                        });
                        setMembers(prev => prev.map(m => {
                            const d = map[m.name.toLowerCase().trim()] || 0;
                            const rStr = (m.rank || '').toLowerCase();
                            const rNum = parseInt(rStr.match(/\d+/)?.[0] || 0);
                            const exempt = rNum >= 9;
                            return { ...m, currentDuty: d, ip: (d < 200 && !exempt) ? (m.ip || 0) + 1 : m.ip };
                        }));
                        showToast("Aktivitas Berhasil Diproses");
                    }
                    e.target.value = null;
                };
                reader.readAsArrayBuffer(file);
            };

            const filteredMembers = useMemo(() => {
                let list = members.filter(m => (m.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || (m.badge || '').toLowerCase().includes(searchTerm.toLowerCase()));

                // Tab Filtering
                if (activeTab === 'warning') {
                    list = list.filter(m => {
                        const rNum = parseInt((m.rank || '').match(/\d+/)?.[0] || 0);
                        return m.currentDuty < 200 && rNum < 9;
                    });
                }

                list.sort((a, b) => {
                    let vA = a[sort.key], vB = b[sort.key];
                    if (sort.key === 'rank') {
                        const getNum = s => parseInt((s || '').match(/\d+/)?.[0] || 0);
                        vA = getNum(vA); vB = getNum(vB);
                    } else if (typeof vA === 'string') {
                        vA = vA.toLowerCase();
                        vB = vB.toLowerCase();
                    }
                    if (vA === vB) return 0;
                    return sort.dir === 'asc' ? (vA < vB ? -1 : 1) : (vA < vB ? 1 : -1);
                });
                return list;
            }, [members, searchTerm, sort, activeTab]);

            const handleReduceIP = async () => {
                if (!reductionReason.trim()) return showToast("Alasan pengurangan wajib diisi!", "error");
                const timestamp = new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
                setMembers(prev => prev.map(p => {
                    if (p.name === showReductionModal) {
                        const newHistory = p.ipHistory || [];
                        return {
                            ...p,
                            ip: Math.max(0, (p.ip || 0) - 1),
                            ipHistory: [...newHistory, { reason: reductionReason.trim(), date: timestamp, type: 'reduction' }]
                        };
                    }
                    return p;
                }));
                showToast("Poin IP berhasil dikurangi");
                setShowReductionModal(null);
                setReductionReason("");
            };

            const handleEditStaff = () => {
                if (!editStaffData.name || !editStaffData.badge) return showToast("Nama dan Badge wajib diisi!", "error");
                setMembers(prev => prev.map(p => p.name === showEditStaffModal.name ? { ...p, ...editStaffData } : p));
                showToast("Data staff berhasil diperbarui");
                setShowEditStaffModal(null);
            };

            // --- Templates ---
            if (!isLoggedIn) return (
                <div className="min-h-screen bg-[#040812] flex items-center justify-center p-6 relative font-['Inter']">
                    <div className="absolute top-0 w-[600px] h-[300px] bg-indigo-600/10 blur-[100px] rounded-full pointer-events-none"></div>

                    <div className="w-full max-w-[460px] relative z-10">
                        <div className="bg-[#0D1224] border border-white/5 p-12 rounded-[48px] shadow-2xl relative">
                            <div className="text-center mb-10">
                                <div className="flex justify-center mb-6">
                                    <div className="w-24 h-24">
                                        <img src="https://i.imgur.com/hHQgKs9.png" className="w-full h-full object-contain" alt="Logo" />
                                    </div>
                                </div>
                                <h1 className="text-3xl font-black text-white mb-3 font-['Outfit'] tracking-tight">Internal Affairs Portal</h1>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-6">
                                <div className="space-y-2.5">
                                    <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-[2px] ml-1">Email</label>
                                    <div className="relative group/input">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 transition-colors">
                                            <Icon name="shield-check" className="w-5 h-5" />
                                        </div>
                                        <input
                                            type="email"
                                            value={loginEmail}
                                            onChange={e => setLoginEmail(e.target.value)}
                                            className="w-full bg-[#050914] border border-white/5 rounded-xl py-3 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500/50 transition-all text-sm font-medium"
                                            placeholder="admin@san.ia"
                                            required
                                        />
                                    </div>
                                </div>

                                <div className="space-y-2.5">
                                    <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-[2px] ml-1">Password</label>
                                    <div className="relative group/input">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 transition-colors">
                                            <Icon name="lock" className="w-5 h-5" />
                                        </div>
                                        <input
                                            type="password"
                                            value={loginPass}
                                            onChange={e => setLoginPass(e.target.value)}
                                            className="w-full bg-[#050914] border border-white/5 rounded-xl py-3 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500/50 transition-all font-mono tracking-[0.4em] text-sm"
                                            placeholder="••••••••"
                                            required
                                        />
                                    </div>
                                </div>

                                <div className="pt-2">
                                    <button className="w-full bg-[#5244E3] hover:bg-[#4336C9] text-white font-bold py-4 rounded-2xl shadow-[0_10px_30px_-10px_rgba(82,68,227,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                                        <span className="tracking-[3px] uppercase text-[11px] font-bold ml-2">Login</span>
                                        <Icon name="chevron-right" className="w-4 h-4" />
                                    </button>
                                </div>
                            </form>

                            {toast && toast.type === 'error' && (
                                <div className="mt-8 bg-rose-500/10 border border-rose-500/20 rounded-xl p-4 flex items-center gap-3 text-rose-400 text-sm">
                                    <Icon name="alert-triangle" className="w-4 h-4" />
                                    <span className="font-bold tracking-tight">{toast.msg}</span>
                                </div>
                            )}
                        </div>
                        <div className="flex flex-col items-center mt-10 space-y-4">
                            <p className="text-slate-600 text-[10px] font-black tracking-[3px] uppercase opacity-40">&copy; 2026 SAN Internal Affairs</p>
                            <div className="flex gap-4 opacity-30">
                                <div className="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex min-h-screen bg-[#f1f5f9] dark:bg-[#0b1120] text-slate-800 dark:text-slate-200 font-['Inter'] relative">
                    {/* Mobile Overlay */}
                    {isMobileMenuOpen && (
                        <div onClick={() => setIsMobileMenuOpen(false)} className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[55] lg:hidden transition-opacity"></div>
                    )}

                    {/* Clean Sidebar */}
                    <aside className={`w-[320px] h-screen fixed top-0 left-0 bg-white dark:bg-[#0D1224] border-r border-slate-100 dark:border-white/5 p-8 flex flex-col z-[60] transition-transform duration-300 lg:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        {/* Logo Area */}
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-10 h-10 flex items-center justify-center shrink-0">
                                <img src="https://i.imgur.com/hHQgKs9.png" className="w-full h-full object-contain" alt="Logo" />
                            </div>
                            <span className="text-[20px] font-black font-['Outfit'] tracking-tight text-slate-900 dark:text-white leading-none">SAN Internal Affairs</span>
                            <button onClick={() => setIsMobileMenuOpen(false)} className="lg:hidden ml-auto p-2 text-slate-400 hover:text-slate-600">
                                <Icon name="x" className="w-6 h-6" />
                            </button>
                        </div>

                        <div className="flex-1 space-y-8 overflow-y-auto no-scrollbar">
                            {/* Navigation */}
                            <div className="space-y-1">
                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-[2px] mb-3">Navigasi</div>
                                <button onClick={() => { setActiveScreen('dashboard'); setIsMobileMenuOpen(false); }} className={`card-sidebar w-full !py-2.5 ${activeScreen === 'dashboard' ? 'active' : ''}`}>
                                    <Icon name="layout-dashboard" className="w-5 h-5" />
                                    <span>Dashboard</span>
                                </button>
                                {isAdmin && (
                                    <button onClick={() => { setActiveScreen('admin'); setIsMobileMenuOpen(false); if (isAdmin) fetchAdminUsers(); }} className={`card-sidebar w-full !py-2.5 ${activeScreen === 'admin' ? 'active' : ''}`}>
                                        <Icon name="shield-check" className="w-5 h-5" />
                                        <span>Admin Control</span>
                                        {isRank10 && <span className="ml-auto text-[9px] font-black bg-amber-400 text-amber-900 px-2 py-0.5 rounded-full uppercase tracking-wider">R10</span>}
                                        {isGM && <span className="ml-auto text-[9px] font-black bg-indigo-500 text-white px-2 py-0.5 rounded-full uppercase tracking-wider">GM</span>}
                                    </button>
                                )}
                            </div>

                            <div className="w-full h-px bg-slate-100 dark:bg-white/5"></div>

                            {/* Controls Area */}
                            <div className="space-y-4">
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Tahun</label>
                                    <div className="relative">
                                        <select value={calYear} onChange={e => setCalYear(Number(e.target.value))} className="w-full bg-slate-50/50 dark:bg-slate-800/50 border border-slate-200 dark:border-white/5 rounded-xl h-10 px-4 text-[13px] font-semibold text-slate-700 dark:text-slate-300 outline-none focus:bg-white dark:focus:bg-slate-800 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-500/10 transition-all appearance-none cursor-pointer">
                                            {[2026, 2027, 2028, 2029, 2030].map(y => <option key={y} value={y}>{y}</option>)}
                                        </select>
                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                            <Icon name="chevron-down" className="w-4 h-4" />
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Pilih Periode</label>
                                    <div className="relative">
                                        <select value={targetWeek} onChange={e => setTargetWeek(e.target.value)} className="w-full bg-slate-50/50 dark:bg-slate-800/50 border border-slate-200 dark:border-white/5 rounded-xl h-10 px-4 text-[13px] font-semibold text-slate-700 dark:text-slate-300 outline-none focus:bg-white dark:focus:bg-slate-800 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-500/10 transition-all appearance-none cursor-pointer">
                                            {availableWeeks.map(w => <option key={w} value={w}>{w}</option>)}
                                        </select>
                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                            <Icon name="chevron-down" className="w-4 h-4" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="w-full h-px bg-slate-100 dark:bg-white/5"></div>

                            {/* Data Management Area */}
                            <div className="space-y-4">
                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-[2px]">Manajemen Data</div>
                                <div className="space-y-3">
                                    <label className="flex items-center gap-4 cursor-pointer group">
                                        <div className="w-10 h-10 rounded-[12px] bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center group-hover:bg-emerald-100 dark:group-hover:bg-emerald-900/40 transition-colors">
                                            <Icon name="users" className="w-4 h-4" />
                                        </div>
                                        <span className="text-[14px] font-bold text-slate-700 dark:text-slate-300 group-hover:text-emerald-700 dark:group-hover:text-emerald-400 transition-colors flex items-center gap-2">
                                            Impor Staff
                                            <Icon name="file-down" className="w-4 h-4 text-slate-400" />
                                        </span>
                                        <input type="file" className="hidden" accept=".xlsx" onChange={e => handleFileUpload('members', e)} />
                                    </label>

                                    <label className="flex items-center gap-4 cursor-pointer group">
                                        <div className="w-10 h-10 rounded-[12px] bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 flex items-center justify-center group-hover:bg-indigo-100 dark:group-hover:bg-indigo-900/40 transition-colors">
                                            <Icon name="activity" className="w-4 h-4" />
                                        </div>
                                        <span className="text-[14px] font-bold text-slate-700 dark:text-slate-300 group-hover:text-indigo-700 dark:group-hover:text-indigo-400 transition-colors flex items-center gap-2">
                                            Sinkron Aktivitas
                                            <Icon name="file-up" className="w-4 h-4 text-slate-400" />
                                        </span>
                                        <input type="file" className="hidden" accept=".xlsx" onChange={e => handleFileUpload('activity', e)} />
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div className="mt-auto pt-6 border-t border-slate-100 dark:border-white/5 w-full space-y-2">
                            {/* Logged-in user badge */}
                            <div className="flex items-center gap-3 px-3 py-2.5 bg-slate-50 dark:bg-slate-800/40 rounded-xl border border-slate-100 dark:border-white/5">
                                <div className="w-7 h-7 rounded-full bg-indigo-100 dark:bg-indigo-900/40 flex items-center justify-center">
                                    <Icon name="user" className="w-3.5 h-3.5 text-indigo-600 dark:text-indigo-400" />
                                </div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-wider leading-none mb-0.5">{userDisplayName || currentUserEmail}</p>
                                    <p className="text-[10px] font-bold text-slate-700 dark:text-slate-300 truncate leading-none">{isGM ? 'General Manager' : isRank10 ? 'Rank 10' : 'Admin'}</p>
                                </div>
                                {isGM && <span className="text-[8px] font-black bg-indigo-600 text-white px-1.5 py-0.5 rounded-full shrink-0">GM</span>}
                                {isRank10 && <span className="text-[8px] font-black bg-amber-500 text-white px-1.5 py-0.5 rounded-full shrink-0">R10</span>}
                            </div>
                            <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 py-3 rounded-xl bg-slate-50 dark:bg-slate-800/50 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 font-bold text-xs transition-colors group tracking-[1px]">
                                <Icon name="power" className="w-3.5 h-3.5" />
                                <span className="uppercase text-[10px]">Logout</span>
                            </button>
                        </div>
                    </aside>

                    {/* Content Wrapper */}
                    <main className="lg:ml-80 flex-1 p-6 md:p-12 min-w-0 main-gradient">
                        {/* High-End Header */}
                        <header className="flex flex-col xl:flex-row xl:items-center justify-between mb-10 gap-6">
                            <div className="flex items-center justify-between xl:justify-start gap-4">
                                <button onClick={() => setIsMobileMenuOpen(true)} className="lg:hidden p-3 bg-white border border-slate-200 rounded-xl shadow-sm hover:bg-slate-50">
                                    <Icon name="menu" className="w-6 h-6 text-slate-600" />
                                </button>
                                <div className="space-y-1.5">
                                    <h1 className="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white font-['Outfit'] tracking-tight group">
                                        Internal Affairs Dashboard
                                        <span className="inline-block ml-2 w-2 h-2 rounded-full bg-emerald-500 animate-pulse align-middle"></span>
                                    </h1>
                                    <div className="flex items-center gap-3">
                                        <div className="flex items-center gap-2.5 px-3.5 py-1.5 bg-slate-100/80 dark:bg-slate-800/80 backdrop-blur-sm border border-slate-200 dark:border-slate-700/50 rounded-2xl">
                                            <Icon name="clock" className="w-3.5 h-3.5 text-slate-500 dark:text-slate-400" />
                                            <span className="text-[10px] font-bold text-slate-600 dark:text-slate-400 whitespace-nowrap uppercase tracking-wider">
                                                {getCurrentWeek()}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-4">

                                <button
                                    onClick={toggleTheme}
                                    className="p-3 bg-white dark:bg-[#0B1224] border border-slate-200 dark:border-white/5 rounded-2xl shadow-sm hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-all text-slate-500 dark:text-slate-400 group flex items-center justify-center"
                                    title="Toggle Dark Mode"
                                >
                                    <Icon name={isDarkMode ? "sun" : "moon"} className="w-5 h-5 group-hover:scale-110 transition-transform" />
                                </button>

                                {savedWeeks.length > 0 && (
                                    <div className="relative">
                                        <select
                                            value={activeWeek}
                                            onChange={async (e) => {
                                                const val = e.target.value;
                                                setIsInitialLoading(true);
                                                setActiveWeek(val);
                                                setIsMasterView(val === 'MASTER_DB');

                                                const { data: session } = await sb.from('san_sessions').select('members').eq('week_name', val).single();
                                                if (session) setMembers(session.members || []);
                                                setIsInitialLoading(false);
                                            }}
                                            className="appearance-none bg-white dark:bg-[#0B1224] border border-slate-200 dark:border-white/5 rounded-2xl py-3 pl-5 pr-12 text-sm font-bold text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all shadow-sm cursor-pointer"
                                        >
                                            <option value="" disabled>Pilih Periode</option>
                                            <option value="MASTER_DB" className="font-bold text-indigo-600">🌟 DATABASE MASTER</option>
                                            <optgroup label="Riwayat Mingguan">
                                                {savedWeeks.filter(w => w !== 'MASTER_DB').map(w => {
                                                    const num = getWeekNum(w);
                                                    const dateOnly = w.replace(/^Minggu \d+ \u2022 /, '');
                                                    return <option key={w} value={w}>{num ? `Minggu ${num} • ${dateOnly}` : w}</option>;
                                                })}
                                            </optgroup>
                                        </select>
                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                            <Icon name="history" className="w-4 h-4" />
                                        </div>
                                    </div>
                                )}

                                {activeWeek && activeWeek !== 'MASTER_DB' && isRank10 && (
                                    <button
                                        onClick={handleDeleteWeek}
                                        className="p-3 bg-rose-50 dark:bg-rose-900/20 border border-rose-200 dark:border-rose-800/30 rounded-2xl shadow-sm hover:bg-rose-100 dark:hover:bg-rose-900/40 transition-all text-rose-600 dark:text-rose-400 group flex items-center justify-center"
                                        title="Hapus Periode Ini Permanen"
                                    >
                                        <Icon name="trash-2" className="w-5 h-5 group-hover:scale-110 transition-transform" />
                                    </button>
                                )}
                            </div>
                        </header>

                        {/* ===== ADMIN SCREEN ===== */}
                        {activeScreen === 'admin' && isAdmin && (
                            <div className="fade-in space-y-8">
                                {/* Header */}
                                <div className="flex items-center gap-5 mb-2">
                                    <div className="w-16 h-16 rounded-[24px] bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center text-white shadow-xl shadow-indigo-200 dark:shadow-indigo-900/50">
                                        <Icon name="shield-check" className="w-8 h-8" />
                                    </div>
                                    <div>
                                        <h2 className="text-3xl font-black text-slate-900 dark:text-white font-['Outfit'] tracking-tight">Admin Control Panel</h2>
                                        <p className="text-sm font-bold text-slate-400 mt-0.5">Manajemen Akun &amp; Keamanan Sistem</p>
                                    </div>
                                </div>

                                {/* Top Cards */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {/* Current Session Card */}
                                    <div className="bg-white dark:bg-[#0B1224] rounded-3xl border border-slate-100 dark:border-white/5 p-8 shadow-sm">
                                        <div className="flex items-center gap-4 mb-6">
                                            <div className="w-12 h-12 rounded-2xl bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 flex items-center justify-center">
                                                <Icon name="user-check" className="w-6 h-6" />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-[2px]">Sesi Aktif</p>
                                                <h3 className="text-lg font-black text-slate-900 dark:text-white font-['Outfit']">{userDisplayName || currentUserEmail}</h3>
                                            </div>
                                        </div>
                                        <div className="space-y-3">
                                            {[
                                                { l: 'Email', v: currentUserEmail },
                                                { l: 'Role', v: isGM ? 'General Manager (GM)' : 'Rank 10' },
                                                { l: 'Kelola User', v: isAdmin ? 'Diizinkan' : 'Read Only' },
                                            ].map((item, i) => (
                                                <div key={i} className="flex items-center justify-between py-2.5 border-b border-slate-50 dark:border-white/5 last:border-0">
                                                    <span className="text-sm font-semibold text-slate-500 dark:text-slate-400">{item.l}</span>
                                                    <span className="text-xs font-bold text-slate-700 dark:text-slate-200 text-right max-w-[55%] truncate">{item.v}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Security Card */}
                                    <div className="bg-white dark:bg-[#0B1224] rounded-3xl border border-slate-100 dark:border-white/5 p-8 shadow-sm flex flex-col">
                                        <div className="flex items-center gap-4 mb-6">
                                            <div className="w-12 h-12 rounded-2xl bg-rose-50 dark:bg-rose-900/20 text-rose-600 flex items-center justify-center">
                                                <Icon name="lock" className="w-6 h-6" />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-[2px]">Keamanan</p>
                                                <h3 className="text-lg font-black text-slate-900 dark:text-white font-['Outfit']">Password Akun Saya</h3>
                                            </div>
                                        </div>
                                        <p className="text-sm text-slate-500 dark:text-slate-400 mb-6 leading-relaxed flex-1">
                                            Setiap akun memiliki password masing-masing. Anda hanya bisa mengubah password akun Anda sendiri. Untuk reset password akun lain, gunakan Supabase Dashboard.
                                        </p>
                                        <button
                                            onClick={() => setShowChangePassModal(true)}
                                            className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl bg-gradient-to-r from-rose-500 to-rose-600 hover:from-rose-600 hover:to-rose-700 text-white font-bold text-sm shadow-lg shadow-rose-200 dark:shadow-rose-900/30 active:scale-[0.98] transition-all"
                                        >
                                            <Icon name="key" className="w-5 h-5" />
                                            Ganti Password Saya
                                        </button>
                                    </div>
                                </div>

                                {/* System Stats */}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {[
                                        { l: 'Total Staff', v: members.length, i: 'users-2', c: 'text-indigo-600', bg: 'bg-indigo-50 dark:bg-indigo-900/20' },
                                        { l: 'Periode Aktif', v: savedWeeks.length, i: 'calendar', c: 'text-emerald-600', bg: 'bg-emerald-50 dark:bg-emerald-900/20' },
                                        { l: 'Admin Users', v: adminUsers.length, i: 'shield-check', c: 'text-amber-600', bg: 'bg-amber-50 dark:bg-amber-900/20' },
                                        { l: 'Platform', v: 'Supabase', i: 'database', c: 'text-sky-600', bg: 'bg-sky-50 dark:bg-sky-900/20' },
                                    ].map((item, i) => (
                                        <div key={i} className="bg-white dark:bg-[#0B1224] rounded-2xl border border-slate-100 dark:border-white/5 p-5 shadow-sm flex items-center gap-4">
                                            <div className={`w-10 h-10 rounded-xl ${item.bg} flex items-center justify-center shrink-0`}>
                                                <Icon name={item.i} className={`w-5 h-5 ${item.c}`} />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-wider">{item.l}</p>
                                                <p className="text-xl font-black text-slate-900 dark:text-white font-['Outfit']">{item.v}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* ===== USER MANAGEMENT TABLE ===== */}
                                <div className="bg-white dark:bg-[#0B1224] rounded-3xl border border-slate-100 dark:border-white/5 shadow-sm overflow-hidden">
                                    <div className="p-8 border-b border-slate-50 dark:border-slate-800/50 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 rounded-2xl bg-indigo-600 text-white flex items-center justify-center shadow-lg shadow-indigo-200 dark:shadow-indigo-900/40">
                                                <Icon name="users-2" className="w-6 h-6" />
                                            </div>
                                            <div>
                                                <h3 className="text-lg font-black text-slate-900 dark:text-white font-['Outfit']">Manajemen User Admin</h3>
                                                <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest">{adminUsers.length} akun terdaftar</p>
                                            </div>
                                        </div>
                                        {isAdmin && (
                                            <button
                                                onClick={() => setShowAddUserModal(true)}
                                                className="flex items-center gap-2 px-5 py-3 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm shadow-lg shadow-indigo-200 dark:shadow-indigo-900/30 active:scale-[0.98] transition-all whitespace-nowrap"
                                            >
                                                <Icon name="user-plus" className="w-4 h-4" />
                                                Tambah User
                                            </button>
                                        )}
                                    </div>

                                    {adminUsersLoading ? (
                                        <div className="flex items-center justify-center py-16 gap-3 text-slate-400">
                                            <Icon name="loader-2" className="w-5 h-5 animate-spin" />
                                            <span className="text-sm font-semibold">Memuat data...</span>
                                        </div>
                                    ) : adminUsers.length === 0 ? (
                                        <div className="flex flex-col items-center justify-center py-16 gap-3 text-slate-400">
                                            <Icon name="users" className="w-8 h-8" />
                                            <p className="text-sm font-semibold">Belum ada user terdaftar</p>
                                            {isAdmin && <p className="text-xs text-slate-400">Klik "Tambah User" untuk menambahkan akun baru</p>}
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="bg-slate-50/80 dark:bg-slate-800/40">
                                                        {['Nama / Email', 'Role', 'Status', ...(isAdmin ? ['Aksi'] : [])].map((col, i) => (
                                                            <th key={i} className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-[2px] first:pl-10 last:pr-10">{col}</th>
                                                        ))}
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50 dark:divide-slate-800/50">
                                                    {adminUsers.map((u) => (
                                                        <tr key={u.id} className={`transition-all ${u.email === currentUserEmail ? 'bg-indigo-50/40 dark:bg-indigo-900/10' : 'hover:bg-slate-50/60 dark:hover:bg-slate-800/30'}`}>
                                                            <td className="px-8 py-5 pl-10">
                                                                <div className="flex items-center gap-3">
                                                                    <div className={`w-9 h-9 rounded-xl flex items-center justify-center text-xs font-black text-white shrink-0 ${u.role === 'gm' ? 'bg-indigo-600' : 'bg-amber-500'}`}>
                                                                        {(u.display_name || u.email).charAt(0).toUpperCase()}
                                                                    </div>
                                                                    <div>
                                                                        <p className="text-sm font-bold text-slate-900 dark:text-slate-100 flex items-center gap-2">
                                                                            {u.display_name}
                                                                            {u.email === currentUserEmail && <span className="text-[9px] font-black bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 px-1.5 py-0.5 rounded-lg">Anda</span>}
                                                                        </p>
                                                                        <p className="text-[11px] text-slate-400 font-medium">{u.email}</p>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                            <td className="px-8 py-5">
                                                                <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-xl text-[10px] font-black uppercase tracking-wider ${u.role === 'gm' ? 'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400' : 'bg-amber-50 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400'}`}>
                                                                    <Icon name={u.role === 'gm' ? 'crown' : 'shield'} className="w-3 h-3" />
                                                                    {u.role === 'gm' ? 'General Manager' : 'Rank 10'}
                                                                </span>
                                                            </td>
