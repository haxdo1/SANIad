                                                            <td className="px-8 py-5">
                                                                <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-xl text-[10px] font-black uppercase ${u.is_active ? 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400' : 'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}>
                                                                    <span className={`w-1.5 h-1.5 rounded-full ${u.is_active ? 'bg-emerald-500' : 'bg-slate-400'}`}></span>
                                                                    {u.is_active ? 'Aktif' : 'Nonaktif'}
                                                                </span>
                                                            </td>
                                                            {isAdmin && (
                                                                <td className="px-8 py-5 pr-10">
                                                                    <div className="flex items-center gap-2">
                                                                        <button
                                                                            onClick={() => { setResetTargetEmail(u.email); setShowResetModal(true); }}
                                                                            disabled={u.email === currentUserEmail || (isGM && u.role === 'rank10')}
                                                                            title={isGM && u.role === 'rank10' ? "Anda tidak punya akses ke Rank 10" : "Reset Password User"}
                                                                            className="w-8 h-8 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 text-slate-400 hover:text-indigo-600 flex items-center justify-center transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                                                                        >
                                                                            <Icon name="key" className="w-4 h-4" />
                                                                        </button>
                                                                        <button
                                                                            onClick={() => handleToggleUserActive(u.id, u.is_active)}
                                                                            disabled={u.email === currentUserEmail || (isGM && u.role === 'rank10')}
                                                                            title={isGM && u.role === 'rank10' ? "Anda tidak punya akses ke Rank 10" : (u.is_active ? 'Nonaktifkan' : 'Aktifkan')}
                                                                            className="w-8 h-8 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-amber-50 dark:hover:bg-amber-900/20 text-slate-400 hover:text-amber-600 flex items-center justify-center transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                                                                        >
                                                                            <Icon name={u.is_active ? 'pause-circle' : 'play-circle'} className="w-4 h-4" />
                                                                        </button>
                                                                        <button
                                                                            onClick={() => handleRemoveUser(u.id, u.email)}
                                                                            disabled={u.email === currentUserEmail || removingUserId === u.id || (isGM && u.role === 'rank10')}
                                                                            title={isGM && u.role === 'rank10' ? "Anda tidak punya akses ke Rank 10" : "Hapus User"}
                                                                            className="w-8 h-8 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-rose-50 dark:hover:bg-rose-900/20 text-slate-400 hover:text-rose-600 flex items-center justify-center transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                                                                        >
                                                                            <Icon name={removingUserId === u.id ? 'loader-2' : 'trash-2'} className={`w-4 h-4 ${removingUserId === u.id ? 'animate-spin' : ''}`} />
                                                                        </button>
                                                                    </div>
                                                                </td>
                                                            )}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeScreen === 'dashboard' && <div className="fade-in space-y-12">
                            {/* Insane Stats Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                {[
                                    { l: 'Total Staff', v: stats.total, i: 'users-2', ic: 'text-indigo-600', bg: 'bg-indigo-50/50', trend: 'Live', color: '#6366f1', tt: 'Data diperbarui secara langsung dari sesi aktif' },
                                    { l: 'Aktif (≥200m)', v: stats.active, i: 'zap', ic: 'text-emerald-600', bg: 'bg-emerald-50/50', trend: `${stats.total > 0 ? Math.round((stats.active / stats.total) * 100) : 0}%`, color: '#10b981', tt: `${stats.total > 0 ? Math.round((stats.active / stats.total) * 100) : 0}% dari total staff telah memenuhi minimal 200 menit duty` },
                                    { l: 'Disiplin (0 IP)', v: stats.disciplined, i: 'shield-check', ic: 'text-sky-600', bg: 'bg-sky-50/50', trend: `${stats.total > 0 ? Math.round((stats.disciplined / stats.total) * 100) : 0}%`, color: '#0ea5e9', tt: `${stats.total > 0 ? Math.round((stats.disciplined / stats.total) * 100) : 0}% dari total staff tidak memiliki poin penalti IP` },
                                    { l: 'Melanggar (>0 IP)', v: stats.melanggar, i: 'alert-octagon', ic: 'text-rose-600', bg: 'bg-rose-50/50', trend: `${stats.total > 0 ? Math.round((stats.melanggar / stats.total) * 100) : 0}%`, color: '#f43f5e', tt: `${stats.total > 0 ? Math.round((stats.melanggar / stats.total) * 100) : 0}% dari total staff memiliki poin penalti IP aktif` }
                                ].map((s, i) => (
                                    <div key={i} className="stat-card">
                                        <div className="absolute -right-6 -top-6 opacity-[0.03] group-hover:opacity-[0.08] group-hover:scale-150 group-hover:rotate-12 transition-all duration-1000 pointer-events-none overflow-hidden rounded-full">
                                            <Icon name={s.i} className="w-48 h-48" />
                                        </div>
                                        <div className="flex items-center justify-between mb-6 relative z-10">
                                            <div className={`w-14 h-14 rounded-2xl ${s.bg} ${s.ic} dark:bg-white/5 flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-all duration-500 shadow-sm`}>
                                                <Icon name={s.i} className="w-7 h-7" />
                                            </div>
                                            <div className="flex flex-col items-end">
                                                <div className="relative group/tip">
                                                    <span className={`text-[10px] font-black px-2.5 py-1 rounded-lg cursor-default ${i === 0 ? 'bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400' : i === 3 ? 'bg-rose-50 dark:bg-rose-900/40 text-rose-600 dark:text-rose-400' : 'bg-emerald-50 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400'} uppercase tracking-wider`}>
                                                        {s.trend}
                                                    </span>
                                                    {/* Tooltip */}
                                                    <div className="absolute right-0 bottom-full mb-2 z-50 w-52 bg-slate-900 dark:bg-slate-800 text-white text-[11px] font-medium leading-relaxed px-3.5 py-2.5 rounded-xl shadow-xl border border-white/10 opacity-0 invisible group-hover/tip:opacity-100 group-hover/tip:visible transition-all duration-200 pointer-events-none">
                                                        <div className="absolute -bottom-1.5 right-4 w-3 h-3 bg-slate-900 dark:bg-slate-800 border-b border-r border-white/10 rotate-45"></div>
                                                        {s.tt}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="relative z-10">
                                            <p className="text-[11px] font-bold text-slate-400 uppercase tracking-[1.5px] mb-1.5">{s.l}</p>
                                            <div className="flex items-baseline gap-2">
                                                <h3 className="text-4xl font-black text-slate-900 dark:text-white group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors font-['Outfit'] tabular-nums leading-none">{s.v}</h3>
                                                <span className="text-[10px] font-bold text-slate-400">Staff</span>
                                            </div>
                                        </div>
                                        <div className="mt-8 flex items-center gap-2 relative z-10">
                                            <div className="flex-1 h-2 bg-slate-100/50 dark:bg-slate-800/50 rounded-full overflow-hidden">
                                                <div
                                                    className="h-full rounded-full transition-all duration-1000 ease-out relative"
                                                    style={{
                                                        width: `${(s.v / (stats.total || 1)) * 100}%`,
                                                        backgroundColor: s.color,
                                                        boxShadow: `0 0 15px ${s.color}66`
                                                    }}
                                                >
                                                    <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent animate-[shimmer_2s_infinite]"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Modern Charts Frame */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* Diagram Keaktifan */}
                                <div className="bg-white dark:bg-[#0B1224] p-6 rounded-2xl border border-slate-100 dark:border-white/5 shadow-sm dark:shadow-none flex flex-col hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-slate-800 dark:text-white font-bold text-lg">Diagram Keaktifan</h3>
                                        <button onClick={() => downloadChart('chart1', 'Diagram_Keaktifan')} className="text-slate-400 hover:text-indigo-600 transition-colors" title="Download Diagram Keaktifan">
                                            <Icon name="download" className="w-4 h-4" />
                                        </button>
                                    </div>
                                    <div className="flex-1 w-full relative min-h-[260px] flex items-center justify-center">
                                        {stats.total > 0 ? <canvas id="chart1"></canvas> : <div className="text-slate-400 text-sm">Menunggu data...</div>}
                                    </div>
                                </div>

                                {/* Diagram Disiplin */}
                                <div className="bg-white dark:bg-[#0B1224] p-6 rounded-2xl border border-slate-100 dark:border-white/5 shadow-sm dark:shadow-none flex flex-col hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-slate-800 dark:text-white font-bold text-lg">Diagram Disiplin</h3>
                                        <button onClick={() => downloadChart('chart2', 'Diagram_Disiplin')} className="text-slate-400 hover:text-indigo-600 transition-colors" title="Download Diagram Disiplin">
                                            <Icon name="download" className="w-4 h-4" />
                                        </button>
                                    </div>
                                    <div className="flex-1 w-full relative min-h-[260px] flex items-center justify-center">
                                        {stats.total > 0 ? <canvas id="chart2"></canvas> : <div className="text-slate-400 text-sm">Menunggu data...</div>}
                                    </div>
                                </div>

                                {/* Top 3 Terlama */}
                                <div className="bg-white dark:bg-[#0B1224] p-6 rounded-2xl border border-slate-100 dark:border-white/5 shadow-sm dark:shadow-none flex flex-col hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-slate-800 dark:text-white font-bold text-lg flex items-center gap-2">
                                            <Icon name="award" className="w-5 h-5 text-amber-500" />
                                            Top 3 Duty Time
                                        </h3>
                                        <button onClick={() => downloadChart('chart3', 'Top_3_Terlama')} className="text-slate-400 hover:text-indigo-600 transition-colors" title="Download Top 3">
                                            <Icon name="download" className="w-4 h-4" />
                                        </button>
                                    </div>
                                    <div className="flex-1 w-full relative min-h-[260px] flex items-center justify-center mt-2">
                                        {stats.total > 0 ? <canvas id="chart3"></canvas> : <div className="text-slate-400 text-sm">Sedang memproses...</div>}
                                    </div>
                                </div>
                            </div>


                            {/* High-Performance Table */}
                            <div className="bg-white dark:bg-[#0B1224] rounded-[40px] border border-slate-100 dark:border-white/5 shadow-2xl shadow-slate-200/50 dark:shadow-none overflow-hidden font-['Inter']">
                                <div className="p-10 border-b border-slate-50 dark:border-slate-800/50 bg-slate-50/30 dark:bg-slate-800/20 flex flex-col md:flex-row md:items-center justify-between gap-8">
                                    <div className="flex items-center gap-5">
                                        <div className={`w-14 h-14 ${isMasterView ? 'bg-amber-500' : 'bg-indigo-600'} text-white rounded-[20px] flex items-center justify-center shadow-lg`}>
                                            <Icon name={isMasterView ? 'star' : 'database'} className="w-7 h-7" />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold font-['Outfit'] tracking-tight text-slate-900 dark:text-white">{isMasterView ? 'Database Master Staff' : 'Database Sesi Aktif'}</h3>
                                            <div className="flex items-center gap-3 mt-1.5">
                                                <button onClick={() => setActiveTab('all')} className={`text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full transition-all ${activeTab === 'all' ? 'bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-white' : 'text-slate-400 hover:text-slate-600'}`}>Semua Staff</button>
                                                {!isMasterView && <button onClick={() => setActiveTab('warning')} className={`text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full transition-all ${activeTab === 'warning' ? 'bg-rose-500 text-white shadow-lg shadow-rose-200' : 'text-slate-400 hover:text-rose-600'}`}>Peringatan {'<'} 200 Menit</button>}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-4 flex-1 justify-end">
                                        <div className="relative group w-full sm:w-auto">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 transition-colors">
                                                <Icon name="search" className="w-5 h-5" />
                                            </div>
                                            <input
                                                type="text"
                                                placeholder="Cari Staff..."
                                                value={searchTerm}
                                                onChange={e => setSearchTerm(e.target.value)}
                                                className="w-full sm:w-64 bg-white dark:bg-slate-800/60 border border-slate-200 dark:border-white/10 rounded-2xl py-3 pl-12 pr-4 text-sm font-medium focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all shadow-sm"
                                            />
                                        </div>

                                        <button
                                            onClick={() => {
                                                const today = new Date().toISOString().split('T')[0];
                                                const exportData = filteredMembers.map(m => {
                                                    const row = {
                                                        "Badge": m.badge,
                                                        "Nama Staff": m.name,
                                                        "Pangkat": m.rank,
                                                        "Total IP": m.ip || 0
                                                    };
                                                    if (!isMasterView) row["Waktu Duty (Menit)"] = m.currentDuty || 0;
                                                    return row;
                                                });
                                                const ws = XLSX.utils.json_to_sheet(exportData);
                                                const wb = XLSX.utils.book_new();
                                                XLSX.utils.book_append_sheet(wb, ws, "Database");
                                                const fname = isMasterView ? `SAN_Master_${today}` : (activeTab === 'warning' ? `SAN_Under200_${today}` : `IA_Export_${activeWeek.replace(/\s/g, '_')}`);
                                                XLSX.writeFile(wb, `${fname}.xlsx`);
                                                showToast("Laporan Berhasil Diunduh");
                                            }}
                                            className={`btn-primary group !py-3.5 !px-8 !rounded-2xl whitespace-nowrap ${activeTab === 'warning' ? '!bg-rose-500 !shadow-rose-200/50' : ''}`}
                                        >
                                            <Icon name="download-cloud" className="w-5 h-5" />
                                            <span className="text-[11px] tracking-[2px] font-bold uppercase">{activeTab === 'warning' ? 'Download < 200m' : 'Export Data'}</span>
                                        </button>
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50/80 dark:bg-slate-800/50">
                                                {[
                                                    { l: 'Staff', k: 'name' },
                                                    { l: 'Rank', k: 'rank' },
                                                    { l: 'Aktivitas', k: 'currentDuty' },
                                                    { l: 'Penalti IP', k: 'ip' },
                                                    { l: 'Aksi', k: null }
                                                ].map((col, i) => (
                                                    <th key={i} onClick={() => col.k && setSort({ key: col.k, dir: sort.key === col.k && sort.dir === 'asc' ? 'desc' : 'asc' })} className={`px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-[3px] cursor-pointer hover:bg-white dark:hover:bg-[#0B1224] transition-all group first:pl-12 last:pr-12 relative ${!col.k ? 'cursor-default hover:bg-transparent' : ''} ${col.l === 'Aktivitas' && isMasterView ? 'hidden' : ''}`}>
                                                        <div className="flex items-center gap-3 relative z-10">
                                                            <span>{col.l}</span>
                                                            {col.k && (
                                                                <div className={`transition-all duration-300 ${sort.key === col.k ? 'opacity-100 text-indigo-600 scale-125' : 'opacity-0 translate-y-1 group-hover:opacity-100 group-hover:translate-y-0'}`}>
                                                                    <Icon name={sort.dir === 'asc' ? 'arrow-up-narrow-wide' : 'arrow-down-wide-narrow'} className="w-4 h-4" />
                                                                </div>
                                                            )}
                                                        </div>
                                                        {col.k && sort.key === col.k && <div className="absolute bottom-0 left-10 right-10 h-0.5 bg-indigo-500 rounded-full"></div>}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50 dark:divide-slate-800/50">
                                            {filteredMembers.map((m, idx) => (
                                                <tr
                                                    key={idx}
                                                    onClick={() => {
                                                        if (isMasterView && isAdmin) {
                                                            // Restriction: GM cannot edit Rank 10 staff
                                                            if (isGM && m.rank && m.rank.includes('[10]')) {
                                                                showToast("GM tidak diizinkan mengubah profil staff Rank 10!", "error");
                                                                return;
                                                            }
                                                            setEditStaffData({ badge: m.badge, name: m.name, rank: m.rank });
                                                            setShowEditStaffModal(m);
                                                        } else {
                                                            setSelectedMember(m);
                                                        }
                                                    }}
                                                    className={`hover:bg-slate-50/80 dark:hover:bg-slate-800/50 transition-all duration-300 group cursor-pointer ${isMasterView && isAdmin ? 'border-l-4 border-l-transparent hover:border-l-indigo-500' : ''}`}
                                                >
                                                    <td className="px-10 py-6 first:pl-12">
                                                        <div className="flex flex-col">
                                                            <span className={`text-sm font-bold tracking-tight transition-colors ${isMasterView && isAdmin ? 'text-indigo-600 dark:text-indigo-400 decoration-2 underline-offset-4' : 'text-slate-900 dark:text-slate-200 group-hover:text-indigo-600 dark:group-hover:text-indigo-400'}`}>
                                                                {m.name}
                                                            </span>
                                                            <div className="flex items-center gap-2 mt-0.5">
                                                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">#{m.badge}</span>
                                                                {isMasterView && isAdmin && <span className="text-[8px] font-black text-indigo-500 uppercase tracking-[2px] bg-indigo-50 dark:bg-indigo-900/40 px-1.5 py-0.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity">KLIK UNTUK EDIT</span>}
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="px-10 py-6">
                                                        <span className="inline-flex px-3.5 py-1.5 rounded-xl text-[9px] font-black uppercase bg-white dark:bg-[#0B1224] text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-white/5 shadow-sm group-hover:border-indigo-200 dark:group-hover:border-indigo-500/30 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-all">
                                                            {m.rank}
                                                        </span>
                                                    </td>
                                                    <td className={`px-10 py-6 ${isMasterView ? 'hidden' : ''}`}>
                                                        {m.rank && (m.rank.includes('[9]') || m.rank.includes('[10]')) ? (
                                                            <div className="flex flex-col">
                                                                <div className="inline-flex items-center gap-2 px-3 py-1 rounded-xl font-bold text-[11px] bg-slate-100 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 border border-slate-200/50 dark:border-slate-700/50 w-fit">
                                                                    <Icon name="shield-off" className="w-3.5 h-3.5" />
                                                                    Dikecualikan
                                                                </div>
                                                                <span className="text-[10px] font-bold text-slate-400 ml-1.5 mt-1">{m.currentDuty} Menit</span>
                                                            </div>
                                                        ) : (
                                                            <div className="flex flex-col gap-1.5">
                                                                <div className={`inline-flex items-center gap-2 px-3 py-1 rounded-xl font-bold text-[11px] w-fit ${m.currentDuty >= 200 ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400' : 'bg-rose-50 dark:bg-rose-900/20 text-rose-700 dark:text-rose-400'}`}>
                                                                    <div className={`w-1.5 h-1.5 rounded-full ${m.currentDuty >= 200 ? 'bg-emerald-500' : 'bg-rose-500 shadow-[0_0_12px_rgba(244,63,94,0.4)] animate-pulse'}`}></div>
                                                                    {m.currentDuty} Menit
                                                                </div>
                                                                <div className="w-24 h-1 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                                                    <div
                                                                        className={`h-full rounded-full transition-all duration-1000 ${m.currentDuty >= 200 ? 'bg-emerald-500' : 'bg-rose-500'}`}
                                                                        style={{ width: `${Math.min(100, (m.currentDuty / 200) * 100)}%` }}
                                                                    ></div>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="px-10 py-6">
                                                        <div className={`w-10 h-10 rounded-[14px] flex items-center justify-center text-[11px] font-black border-2 transition-all duration-300 ${m.ip >= 10 ? 'bg-rose-600 text-white border-rose-500 shadow-lg shadow-rose-200' : m.ip > 0 ? 'bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 border-amber-200 dark:border-amber-700/40' : 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 border-emerald-200 dark:border-emerald-700/40'}`}>
                                                            {m.ip || 0}
                                                        </div>
                                                    </td>
                                                    <td className="px-10 py-6 last:pr-12">
                                                        <div className="flex items-center gap-1.5">
                                                            <button
                                                                disabled={!isAdmin}
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    setShowReductionModal(m.name);
                                                                }}
                                                                className="w-8 h-8 rounded-xl bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center hover:bg-emerald-600 hover:text-white transition-all disabled:opacity-30" title="Kurangi IP"
                                                            >
                                                                <Icon name="minus" className="w-4 h-4" />
                                                            </button>
                                                            <button
                                                                disabled={!isAdmin}
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    setMembers(prev => prev.map(p => p.name === m.name ? { ...p, ip: (p.ip || 0) + 1 } : p));
                                                                }}
                                                                className="w-8 h-8 rounded-xl bg-rose-50 dark:bg-rose-900/20 text-rose-600 flex items-center justify-center hover:bg-rose-600 hover:text-white transition-all disabled:opacity-30" title="Tambah IP"
                                                            >
                                                                <Icon name="plus" className="w-4 h-4" />
                                                            </button>
                                                            {m.ipHistory && m.ipHistory.some(h => h.type === 'reduction') && (
                                                                <button
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();
                                                                        setShowHistoryModal(m);
                                                                    }}
                                                                    className="w-8 h-8 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 flex items-center justify-center hover:bg-slate-800 hover:text-white transition-all" title="Riwayat Keterangan"
                                                                >
                                                                    <Icon name="file-text" className="w-4 h-4" />
                                                                </button>
                                                            )}
                                                            {isAdmin && isMasterView && (
                                                                <button
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();
                                                                        if (isGM && m.rank && m.rank.includes('[10]')) {
                                                                            showToast("GM tidak diizinkan mengubah profil staff Rank 10!", "error");
                                                                            return;
                                                                        }
                                                                        setEditStaffData({ badge: m.badge, name: m.name, rank: m.rank });
                                                                        setShowEditStaffModal(m);
                                                                    }}
                                                                    className="w-8 h-8 rounded-xl bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all shadow-sm" title="Edit Data Staff"
                                                                >
                                                                    <Icon name="pencil" className="w-4 h-4" />
                                                                </button>
                                                            )}
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>}
                    </main>

                    {/* Staff Detail Modal */}
                    {selectedMember && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/60 dark:bg-slate-900/80 backdrop-blur-sm">
                            <div className="bg-white dark:bg-[#0D1224] rounded-[40px] border border-slate-100 dark:border-white/5 shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto no-scrollbar p-10 font-['Inter']">
                                <div className="flex items-center justify-between pb-8 border-b border-slate-100 dark:border-white/5 mb-10">
                                    <div className="flex items-center gap-5">
                                        <div className="w-16 h-16 rounded-[24px] bg-indigo-600 flex items-center justify-center text-white shadow-xl shadow-indigo-200">
                                            <Icon name="user" className="w-8 h-8" />
                                        </div>
                                        <div>
                                            <h2 className="text-3xl font-black text-slate-900 dark:text-white mb-1 font-['Outfit']">{selectedMember.name}</h2>
                                            <p className="text-slate-400 font-bold uppercase tracking-[2px] text-xs">Badge #{selectedMember.badge} • {selectedMember.rank}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedMember(null)} className="w-14 h-14 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-white/5 flex items-center justify-center text-slate-400 hover:text-rose-500 hover:border-rose-100 dark:hover:border-rose-900 transition-all hover:scale-110 active:scale-95 shadow-sm">
                                        <Icon name="x" className="w-6 h-6" />
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                    {[
                                        {
                                            l: 'Progres Aktivitas',
                                            v: `${selectedMember.currentDuty}m`,
                                            i: 'zap',
                                            ic: 'text-indigo-600',
                                            bg: 'bg-indigo-50/50',
                                            trend: `${Math.min(100, Math.round((selectedMember.currentDuty / 200) * 100))}%`,
                                            color: '#6366f1',
                                            val: Math.min(100, (selectedMember.currentDuty / 200) * 100)
                                        },
                                        {
                                            l: 'Status Disiplin',
                                            v: `${selectedMember.ip} IP`,
                                            i: 'shield-check',
                                            ic: selectedMember.ip === 0 ? 'text-emerald-600' : 'text-rose-600',
                                            bg: selectedMember.ip === 0 ? 'bg-emerald-50/50' : 'bg-rose-50/50',
                                            trend: selectedMember.ip === 0 ? 'SAFE' : 'VIOLATED',
                                            color: selectedMember.ip === 0 ? '#10b981' : '#f43f5e',
                                            val: selectedMember.ip === 0 ? 100 : 0
                                        },
                                        {
                                            l: 'Status Akun',
                                            v: selectedMember.currentDuty >= 200 ? 'Active' : 'Missing',
                                            i: 'activity',
                                            ic: selectedMember.currentDuty >= 200 ? 'text-sky-600' : 'text-amber-600',
                                            bg: selectedMember.currentDuty >= 200 ? 'bg-sky-50/50' : 'bg-amber-50/50',
                                            trend: selectedMember.currentDuty >= 200 ? 'VERIFIED' : 'PENDING',
                                            color: selectedMember.currentDuty >= 200 ? '#0ea5e9' : '#f59e0b',
                                            val: selectedMember.currentDuty >= 200 ? 100 : 50
                                        },
                                        {
                                            l: 'Hierarchy Level',
                                            v: (() => {
                                                const rStr = (selectedMember.rank || '').toLowerCase();
                                                const rNum = parseInt(rStr.match(/\d+/)?.[0] || 0);
                                                if (rNum >= 9) return 'High Command';
                                                if (rNum >= 6) return 'Command';
                                                if (rNum === 4 || rNum === 5 || (rNum === 3 && rStr.includes('prob'))) return 'Supervisor';
                                                if (rNum === 2 || rNum === 3) return 'Staff';
                                                if (rNum === 1) return 'Internship';
                                                return 'N/A';
                                            })(),
                                            i: 'layout-grid',
                                            ic: 'text-indigo-600',
                                            bg: 'bg-indigo-50/50',
                                            trend: 'ROSTER',
                                            color: '#6366f1',
                                            val: 100
                                        }
                                    ].map((s, i) => (
                                        <div key={i} className="stat-card">
                                            <div className="absolute -right-6 -top-6 opacity-[0.03] pointer-events-none">
                                                <Icon name={s.i} className="w-48 h-48" />
                                            </div>
                                            <div className="flex items-center justify-between mb-6 relative z-10">
                                                <div className={`w-14 h-14 rounded-2xl ${s.bg} dark:bg-white/5 ${s.ic} flex items-center justify-center shadow-sm`}>
                                                    <Icon name={s.i} className="w-7 h-7" />
                                                </div>
                                                <div className="flex flex-col items-end">
                                                    <span className={`text-[10px] font-black px-2.5 py-1 rounded-lg ${s.ic.includes('rose') ? 'bg-rose-100 dark:bg-rose-900/40 text-rose-600 dark:text-rose-400' :
                                                        s.ic.includes('emerald') ? 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400' :
                                                            s.ic.includes('amber') ? 'bg-amber-100 dark:bg-amber-900/40 text-amber-600 dark:text-amber-400' :
                                                                'bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400'
                                                        } uppercase tracking-wider`}>
                                                        {s.trend}
                                                    </span>
                                                </div>
                                            </div>
                                            <div className="relative z-10">
                                                <p className="text-[11px] font-bold text-slate-400 uppercase tracking-[1.5px] mb-1.5">{s.l}</p>
                                                <h3 className="text-3xl font-black text-slate-900 dark:text-white font-['Outfit'] tabular-nums leading-none">{s.v}</h3>
                                            </div>
                                            <div className="mt-8 flex items-center gap-2 relative z-10">
                                                <div className="flex-1 h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                                    <div
                                                        className="h-full rounded-full transition-all duration-1000 ease-out"
                                                        style={{ width: `${s.val}%`, backgroundColor: s.color }}
                                                    ></div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== ADD USER MODAL ===== */}
                    {showAddUserModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
                            <div className="bg-white dark:bg-[#0D1224] rounded-[40px] border border-slate-100 dark:border-white/5 shadow-2xl w-full max-w-md p-10 font-['Inter']">
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 rounded-[24px] bg-gradient-to-br from-indigo-500 to-indigo-700 flex items-center justify-center text-white shadow-xl shadow-indigo-200 dark:shadow-indigo-900/50 mx-auto mb-5">
                                        <Icon name="user-plus" className="w-8 h-8" />
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-900 dark:text-white font-['Outfit'] mb-2">Tambah User Admin</h2>
                                    <p className="text-sm text-slate-400 font-medium">Daftarkan akun baru ke sistem admin</p>
                                </div>
                                <div className="bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-100 dark:border-emerald-800/30 rounded-2xl p-4 flex items-start gap-3 mb-6">
                                    <Icon name="check-circle" className="w-5 h-5 text-emerald-600 shrink-0 mt-0.5" />
                                    <p className="text-xs font-semibold text-emerald-700 dark:text-emerald-400 leading-relaxed">User yang Anda tambahkan dapat langsung login menggunakan email dan password yang Anda tentukan di sini.</p>
                                </div>
                                <div className="space-y-4">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Nama Tampilan</label>
                                        <input
                                            type="text"
                                            value={newUserName}
                                            onChange={e => setNewUserName(e.target.value)}
                                            placeholder="Contoh: John Doe"
                                            className="w-full bg-slate-50 dark:bg-[#050914] border border-slate-200 dark:border-white/5 rounded-2xl px-4 py-3.5 text-sm font-medium text-slate-900 dark:text-white focus:outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-400 transition-all"
                                        />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Email Log In</label>
                                        <input
                                            type="email"
                                            value={newUserEmail}
                                            onChange={e => setNewUserEmail(e.target.value)}
                                            placeholder="email@san.ia"
                                            className="w-full bg-slate-50 dark:bg-[#050914] border border-slate-200 dark:border-white/5 rounded-2xl px-4 py-3.5 text-sm font-medium text-slate-900 dark:text-white focus:outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-400 transition-all"
                                        />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Password Awal</label>
                                        <input
                                            type="text"
                                            value={newUserPass}
                                            onChange={e => setNewUserPass(e.target.value)}
                                            placeholder="Masukkan password user..."
                                            className="w-full bg-slate-50 dark:bg-[#050914] border border-slate-200 dark:border-white/5 rounded-2xl px-4 py-3.5 text-sm font-medium text-slate-900 dark:text-white focus:outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-400 transition-all"
                                        />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Role</label>
                                        <div className="grid grid-cols-2 gap-3">
                                            {[{ val: 'rank10', label: 'Rank 10', icon: 'shield', color: 'amber' }, { val: 'gm', label: 'General Manager', icon: 'crown', color: 'indigo' }].map(r => {
                                                const isRestrictedForGM = isGM && r.val === 'rank10';
                                                return (
                                                    <button
                                                        key={r.val}
                                                        type="button"
                                                        disabled={isRestrictedForGM}
                                                        onClick={() => setNewUserRole(r.val)}
                                                        className={`p-4 rounded-2xl border-2 text-left transition-all relative ${newUserRole === r.val ? (r.color === 'indigo' ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20' : 'border-amber-500 bg-amber-50 dark:bg-amber-900/20') : 'border-slate-200 dark:border-white/5 hover:border-slate-300'} ${isRestrictedForGM ? 'opacity-40 cursor-not-allowed grayscale' : ''}`}
                                                    >
                                                        <Icon name={r.icon} className={`w-5 h-5 mb-2 ${newUserRole === r.val ? (r.color === 'indigo' ? 'text-indigo-600' : 'text-amber-600') : 'text-slate-400'}`} />
                                                        <p className={`text-xs font-black ${newUserRole === r.val ? (r.color === 'indigo' ? 'text-indigo-700 dark:text-indigo-400' : 'text-amber-700 dark:text-amber-400') : 'text-slate-600 dark:text-slate-400'}`}>{r.label}</p>
                                                        {isRestrictedForGM && <span className="absolute top-2 right-2"><Icon name="lock" className="w-3 h-3 text-slate-400" /></span>}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button onClick={() => { setShowAddUserModal(false); setNewUserEmail(''); setNewUserName(''); setNewUserRole('rank10'); }} className="flex-1 py-3.5 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
                                            Batal
                                        </button>
                                        <button onClick={handleAddUser} className="flex-1 py-3.5 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm shadow-lg shadow-indigo-200 dark:shadow-indigo-900/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                                            <Icon name="check" className="w-4 h-4" />
                                            Tambahkan
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== CHANGE OWN PASSWORD MODAL ===== */}
                    {showChangePassModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
                            <div className="bg-white dark:bg-[#0D1224] rounded-[40px] border border-slate-100 dark:border-white/5 shadow-2xl w-full max-w-md p-10 font-['Inter']">
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 rounded-[24px] bg-gradient-to-br from-rose-500 to-red-600 flex items-center justify-center text-white shadow-xl shadow-rose-200 dark:shadow-rose-900/50 mx-auto mb-5">
                                        <Icon name="lock" className="w-8 h-8" />
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-900 dark:text-white font-['Outfit'] mb-2">Ganti Password Saya</h2>
                                    <p className="text-sm text-slate-400 font-medium">Perubahan segera berlaku. Anda perlu login ulang setelah ini.</p>
                                </div>
                                <div className="space-y-4">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Password Baru</label>
                                        <div className="relative">
                                            <input
                                                type={showNewPass ? 'text' : 'password'}
                                                value={newPass}
                                                onChange={e => setNewPass(e.target.value)}
                                                placeholder="Minimal 6 karakter..."
                                                className="w-full bg-slate-50 dark:bg-[#050914] border border-slate-200 dark:border-white/5 rounded-2xl px-4 py-3.5 pr-12 text-sm font-medium text-slate-900 dark:text-white focus:outline-none focus:ring-4 focus:ring-rose-500/20 focus:border-rose-400 transition-all"
                                            />
                                            <button type="button" onClick={() => setShowNewPass(p => !p)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                                <Icon name={showNewPass ? 'eye-off' : 'eye'} className="w-4 h-4" />
                                            </button>
                                        </div>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Konfirmasi Password</label>
                                        <div className="relative">
                                            <input
                                                type={showConfirmPass ? 'text' : 'password'}
                                                value={confirmPass}
                                                onChange={e => setConfirmPass(e.target.value)}
                                                onKeyDown={e => e.key === 'Enter' && handleChangeOwnPassword()}
                                                placeholder="Ulangi password baru..."
                                                className="w-full bg-slate-50 dark:bg-[#050914] border border-slate-200 dark:border-white/5 rounded-2xl px-4 py-3.5 pr-12 text-sm font-medium text-slate-900 dark:text-white focus:outline-none focus:ring-4 focus:ring-rose-500/20 focus:border-rose-400 transition-all"
                                            />
                                            <button type="button" onClick={() => setShowConfirmPass(p => !p)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                                <Icon name={showConfirmPass ? 'eye-off' : 'eye'} className="w-4 h-4" />
                                            </button>
                                        </div>
                                    </div>
                                    {newPass && confirmPass && newPass !== confirmPass && (
                                        <p className="text-xs font-bold text-rose-500 flex items-center gap-1.5"><Icon name="x-circle" className="w-3.5 h-3.5" /> Password tidak cocok</p>
                                    )}
                                    {newPass && confirmPass && newPass === confirmPass && (
                                        <p className="text-xs font-bold text-emerald-500 flex items-center gap-1.5"><Icon name="check-circle" className="w-3.5 h-3.5" /> Password cocok</p>
                                    )}
                                    <div className="flex gap-3 pt-2">
                                        <button onClick={() => { setShowChangePassModal(false); setNewPass(''); setConfirmPass(''); }} className="flex-1 py-3.5 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
                                            Batal
                                        </button>
                                        <button onClick={handleChangeOwnPassword} className="flex-1 py-3.5 rounded-2xl bg-gradient-to-r from-rose-500 to-red-600 text-white font-bold text-sm shadow-lg shadow-rose-200 dark:shadow-rose-900/30 hover:from-rose-600 hover:to-red-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                                            <Icon name="check" className="w-4 h-4" />
                                            Simpan Password
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}


                    {/* ===== RESET OTHER USER PASSWORD MODAL ===== */}
                    {showResetModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
                            <div className="bg-white dark:bg-[#0D1224] rounded-[40px] border border-slate-100 dark:border-white/5 shadow-2xl w-full max-w-md p-10 font-['Inter']">
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 rounded-[24px] bg-gradient-to-br from-indigo-500 to-indigo-700 flex items-center justify-center text-white shadow-xl shadow-indigo-200 dark:shadow-indigo-900/50 mx-auto mb-5">
                                        <Icon name="key" className="w-8 h-8" />
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-900 dark:text-white font-['Outfit'] mb-2">Reset Password User</h2>
                                    <p className="text-sm text-slate-400 font-medium">Ubah password untuk akun: <span className="text-indigo-500 font-bold">{resetTargetEmail}</span></p>
                                </div>
                                <div className="space-y-4">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Password Baru</label>
                                        <input
                                            type="text"
                                            value={resetNewPass}
                                            onChange={e => setResetNewPass(e.target.value)}
                                            onKeyDown={e => e.key === 'Enter' && handleResetUserPassword()}
                                            placeholder="Masukkan password baru..."
                                            className="w-full bg-slate-50 dark:bg-[#050914] border border-slate-200 dark:border-white/5 rounded-2xl px-4 py-3.5 text-sm font-medium text-slate-900 dark:text-white focus:outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-400 transition-all font-mono"
                                        />
                                    </div>
                                    <div className="bg-rose-50 dark:bg-rose-900/20 border border-rose-100 dark:border-rose-800/30 rounded-2xl p-4 flex items-start gap-3">
                                        <Icon name="alert-triangle" className="w-5 h-5 text-rose-600 shrink-0 mt-0.5" />
                                        <p className="text-xs font-semibold text-rose-700 dark:text-rose-400 leading-relaxed">Catatan: Pastikan untuk memberitahu user tersebut password barunya setelah direset.</p>
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button onClick={() => { setShowResetModal(false); setResetNewPass(''); }} className="flex-1 py-3.5 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
                                            Batal
                                        </button>
                                        <button onClick={handleResetUserPassword} className="flex-1 py-3.5 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm shadow-lg shadow-indigo-200 dark:shadow-indigo-900/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                                            <Icon name="refresh-cw" className="w-4 h-4" />
                                            Reset Sekarang
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Reduce IP Modal */}
                    {showReductionModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
                            <div className="bg-white dark:bg-[#0D1224] rounded-[40px] border border-slate-100 dark:border-white/5 shadow-2xl w-full max-w-md p-10 font-['Inter']">
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 rounded-[24px] bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center text-white shadow-xl shadow-emerald-200 dark:shadow-emerald-900/50 mx-auto mb-5">
                                        <Icon name="minus-circle" className="w-8 h-8" />
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-900 dark:text-white font-['Outfit'] mb-2">Pengurangan Poin IP</h2>
                                    <p className="text-sm text-slate-400 font-medium tracking-tight">Menghapus 1 poin IP dari <span className="text-emerald-500 font-bold">{showReductionModal}</span></p>
                                </div>
                                <div className="space-y-5">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Keterangan / Alasan</label>
                                        <textarea
                                            autoFocus
                                            value={reductionReason}
                                            onChange={e => setReductionReason(e.target.value)}
                                            placeholder="Tulis alasan pengurangan IP di sini..."
                                            className="w-full bg-slate-50 dark:bg-[#050914] border border-slate-200 dark:border-white/5 rounded-2xl px-4 py-3.5 text-sm font-medium text-slate-900 dark:text-white focus:outline-none focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 transition-all min-h-[120px] resize-none"
                                        />
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button onClick={() => { setShowReductionModal(null); setReductionReason(""); }} className="flex-1 py-4 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
                                            Batal
                                        </button>
                                        <button onClick={handleReduceIP} className="flex-1 py-4 rounded-2xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm shadow-lg shadow-emerald-200 dark:shadow-emerald-900/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                                            <Icon name="check" className="w-4 h-4" />
                                            Konfirmasi
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Edit Staff Modal */}
                    {showEditStaffModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
                            <div className="bg-white dark:bg-[#0D1224] rounded-[40px] border border-slate-100 dark:border-white/5 shadow-2xl w-full max-w-md p-10 font-['Inter']">
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 rounded-[24px] bg-gradient-to-br from-indigo-500 to-indigo-700 flex items-center justify-center text-white shadow-xl shadow-indigo-200 dark:shadow-indigo-900/50 mx-auto mb-5">
                                        <Icon name="pencil" className="w-8 h-8" />
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-900 dark:text-white font-['Outfit'] mb-2">Edit Data Staff</h2>
                                    <p className="text-sm text-slate-400 font-medium">Ubah informasi profil untuk {showEditStaffModal.name}</p>
                                </div>
                                <div className="space-y-4">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Badge Number</label>
                                        <input
                                            type="text"
                                            value={editStaffData.badge}
                                            onChange={e => setEditStaffData({ ...editStaffData, badge: e.target.value })}
                                            className="w-full bg-slate-50 dark:bg-[#050914] border border-slate-200 dark:border-white/5 rounded-2xl px-4 py-3.5 text-sm font-bold text-slate-800 dark:text-white focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all"
                                        />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Nama Lengkap</label>
                                        <input
                                            type="text"
                                            value={editStaffData.name}
                                            onChange={e => setEditStaffData({ ...editStaffData, name: e.target.value })}
                                            className="w-full bg-slate-50 dark:bg-[#050914] border border-slate-200 dark:border-white/5 rounded-2xl px-4 py-3.5 text-sm font-bold text-slate-800 dark:text-white focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all"
                                        />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Pangkat (Rank)</label>
                                        <select
                                            value={editStaffData.rank}
                                            onChange={e => setEditStaffData({ ...editStaffData, rank: e.target.value })}
                                            className="w-full bg-slate-50 dark:bg-[#050914] border border-slate-200 dark:border-white/5 rounded-2xl px-4 py-3.5 text-sm font-bold text-slate-800 dark:text-white focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all appearance-none"
                                        >
                                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(r => (
                                                <option key={r} value={`[${r}] ${getRankLabel(r)}`}>[{r}] {getRankLabel(r)}</option>
                                            ))}
                                            <option value="[10] CEO">[10] CEO</option>
                                            <option value="[10] Vice CEO">[10] Vice CEO</option>
                                            <option value="[10] Commissioner">[10] Commissioner</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-3 pt-4">
                                        <button onClick={() => setShowEditStaffModal(null)} className="flex-1 py-4 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
                                            Batal
                                        </button>
                                        <button onClick={handleEditStaff} className="flex-1 py-4 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm shadow-lg shadow-indigo-200 dark:shadow-indigo-900/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                                            <Icon name="save" className="w-4 h-4" />
                                            Simpan Perubahan
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* History Modal */}
                    {showHistoryModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
                            <div className="bg-white dark:bg-[#0D1224] rounded-[40px] border border-slate-100 dark:border-white/5 shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col overflow-hidden font-['Inter']">
                                <div className="p-8 border-b border-slate-50 dark:border-slate-800/50 flex items-center justify-between bg-slate-50/30 dark:bg-slate-800/20">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-2xl bg-indigo-600 text-white flex items-center justify-center shadow-lg shadow-indigo-200 dark:shadow-indigo-900/40">
                                            <Icon name="file-text" className="w-6 h-6" />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold font-['Outfit'] text-slate-900 dark:text-white leading-none">Riwayat Keterangan IP</h3>
                                            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1.5">{showHistoryModal.name}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowHistoryModal(null)} className="w-10 h-10 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400 transition-all flex items-center justify-center">
                                        <Icon name="x" className="w-5 h-5" />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 space-y-4 no-scrollbar">
                                    {(!showHistoryModal.ipHistory || showHistoryModal.ipHistory.length === 0) ? (
                                        <div className="py-20 flex flex-col items-center text-slate-400 gap-3">
                                            <Icon name="ghost" className="w-12 h-12 opacity-20" />
                                            <p className="text-sm font-semibold tracking-tight">Belum ada riwayat keterangan</p>
                                        </div>
                                    ) : (
                                        [...showHistoryModal.ipHistory].reverse().map((h, i) => (
                                            <div key={i} className="group bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-white/5 rounded-3xl p-6 hover:border-indigo-200 dark:hover:border-indigo-500/30 transition-all">
                                                <div className="flex items-center justify-between mb-4">
                                                    <div className="flex items-center gap-2">
                                                        <span className="w-2 h-2 rounded-full bg-emerald-500"></span>
                                                        <span className="text-[10px] font-black text-emerald-600 dark:text-emerald-400 uppercase tracking-[2px] bg-emerald-50 dark:bg-emerald-900/40 px-2 py-0.5 rounded-lg">PENGURANGAN</span>
                                                    </div>
                                                    <span className="text-[11px] font-bold text-slate-400 flex items-center gap-1.5">
                                                        <Icon name="calendar" className="w-3.5 h-3.5" />
                                                        {h.date}
                                                    </span>
                                                </div>
                                                <p className="text-sm font-medium text-slate-600 dark:text-slate-300 leading-relaxed italic">"{h.reason}"</p>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div className="p-8 border-t border-slate-50 dark:border-slate-800/50 bg-slate-50/30 dark:bg-slate-800/20">
                                    <button onClick={() => setShowHistoryModal(null)} className="w-full py-4 rounded-2xl bg-slate-900 text-white font-bold text-sm hover:bg-slate-800 transition-all active:scale-[0.98]">
                                        Tutup Riwayat
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {toast && (
                        <div className="fixed bottom-12 right-12 z-[100] font-['Inter']">
                            <div className={`px-8 py-5 rounded-[24px] glass border shadow-2xl flex items-center gap-5 transition-all ${toast.type === 'error' ? 'bg-rose-500 text-white border-rose-400' : 'bg-slate-900 text-white border-slate-700'}`}>
                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${toast.type === 'error' ? 'bg-white/20' : 'bg-indigo-500 shadow-lg shadow-indigo-500/30'}`}>
                                    <Icon name={toast.type === 'error' ? 'alert-octagon' : 'info'} className="w-5 h-5" />
                                </div>
                                <div className="pr-4">
                                    <p className="text-[10px] font-black uppercase tracking-[2px] opacity-60 mb-0.5">{toast.type === 'error' ? 'Status Alert' : 'System Notice'}</p>
                                    <p className="text-sm font-bold tracking-tight">{toast.msg}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
