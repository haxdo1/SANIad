<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAN | Internal Affairs Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#4f46e5',
                        dark: '#0f172a',
                        'dark-lighter': '#1e293b',
                        accent: '#10b981'
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts: Inter & Outfit -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-[#f1f5f9] dark:bg-[#020617] text-slate-800 dark:text-slate-200 antialiased font-['Inter']; }
            h1, h2, h3, .font-heading { @apply font-['Outfit']; }
        }
        @layer components {
            .glass { @apply bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border border-white/20 dark:border-slate-800; }
            .card-sidebar { @apply transition-all duration-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl px-4 py-3 flex items-center gap-3 text-slate-500 dark:text-slate-400 font-medium cursor-pointer; }
            .card-sidebar.active { @apply bg-indigo-600 text-white shadow-lg shadow-indigo-200 dark:shadow-indigo-900/20; }
            .stat-card { @apply bg-white dark:bg-[#0B1224] p-6 rounded-3xl border border-slate-100 dark:border-white/5 shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none hover:shadow-[0_20px_50px_rgba(99,102,241,0.12)] hover:-translate-y-2 transition-all duration-500 relative; }
            .btn-primary { @apply bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-semibold transition-all shadow-lg shadow-indigo-100 dark:shadow-indigo-900/30 hover:shadow-indigo-200 active:scale-95 flex items-center justify-center gap-2; }
            .input-modern { @apply w-full bg-slate-50 dark:bg-[#050914] border border-slate-200 dark:border-white/5 rounded-xl px-4 py-3 focus:bg-white dark:focus:bg-[#0B1224] focus:ring-4 focus:ring-indigo-100 dark:focus:ring-indigo-900/30 focus:border-indigo-400 dark:focus:border-indigo-500 outline-none transition-all; }
            .chart-container { @apply bg-white dark:bg-[#0B1224] p-8 md:p-10 rounded-[48px] border border-slate-100 dark:border-white/5 shadow-[0_10px_40px_rgba(0,0,0,0.03)] dark:shadow-none hover:shadow-[0_20px_60px_rgba(79,70,229,0.08)] transition-all duration-700; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { @apply bg-slate-200 rounded-full hover:bg-slate-300; }
        
        .chart-glow {
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.2));
        }
        .stat-glow {
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.05);
        }
        .main-gradient {
            background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(79, 70, 229, 0.02) 0%, transparent 50%);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const supabaseUrl = 'https://kllfgqviatusjerecemj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsbGZncXZpYXR1c2plcmVjZW1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NjQ3ODUsImV4cCI6MjA4NzA0MDc4NX0.naHtlVQQdnTiwtfuyRLdyJnws-qu6ky8mnYdOkKwk2E';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        const Icon = ({ name, className = "", ...props }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && name) {
                    ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({ targets: [ref.current] });
                }
            }, [name]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} {...props}></span>;
        };

        // --- Utils ---
        const getWeekRange = (dateObj = new Date()) => {
            const date = new Date(dateObj.getTime());
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(date.setDate(diff));
            const sunday = new Date(monday.getTime()); sunday.setDate(monday.getDate() + 6);
            return `${monday.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })} - ${sunday.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}`;
        };

        const generateWeeks = (year, month) => {
            const weeks = [];
            let date = new Date(year, month, 1);
            let day = date.getDay();
            let diff = date.getDate() - day + (day === 0 ? -6 : 1);
            date.setDate(diff);
            for (let i = 0; i < 6; i++) {
                const w = getWeekRange(new Date(date));
                if (!weeks.includes(w)) weeks.push(w);
                date.setDate(date.getDate() + 7);
                if (date.getMonth() !== month && weeks.length >= 4) break;
            }
            return weeks;
        };

        // --- App Component ---
        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [loginEmail, setLoginEmail] = useState("");
            const [loginPass, setLoginPass] = useState("");
            const [activeScreen, setActiveScreen] = useState("dashboard");
            const [toast, setToast] = useState(null);
            const [isInitialLoading, setIsInitialLoading] = useState(true);

            // Dark Mode State
            const [isDarkMode, setIsDarkMode] = useState(() => {
                const isD = localStorage.getItem('santhem') === 'dark';
                if (isD) document.documentElement.classList.add('dark');
                return isD;
            });

            const toggleTheme = () => {
                setIsDarkMode(prev => {
                    const next = !prev;
                    if (next) document.documentElement.classList.add('dark');
                    else document.documentElement.classList.remove('dark');
                    localStorage.setItem('santhem', next ? 'dark' : 'light');
                    return next;
                });
            };

            // Data States
            const [savedWeeks, setSavedWeeks] = useState([]);
            const [activeWeek, setActiveWeek] = useState("");
            const [members, setMembers] = useState([]);
            const [stats, setStats] = useState({ total: 0, active: 0, inactive: 0, disciplined: 0, melanggar: 0 });
            const [rankStats, setRankStats] = useState({
                hc: { t: 0, a: 0 },
                cmd: { t: 0, a: 0 },
                spv: { t: 0, a: 0 },
                staff: { t: 0, a: 0 },
                intern: { t: 0, a: 0 }
            });
            const [selectedMember, setSelectedMember] = useState(null);
            const [topDuty, setTopDuty] = useState([]);

            // Search & Sort
            const [searchTerm, setSearchTerm] = useState("");
            const [sort, setSort] = useState({ key: 'name', dir: 'asc' });

            // Calendar
            const [calYear, setCalYear] = useState(new Date().getFullYear());
            const [calMonth, setCalMonth] = useState(new Date().getMonth());
            const [availableWeeks, setAvailableWeeks] = useState([]);
            const [targetWeek, setTargetWeek] = useState("");
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const chartRefs = useRef({});

            // --- Effects ---
            useEffect(() => {
                const initData = async () => {
                    // Check Session
                    const { data: { session } } = await sb.auth.getSession();
                    if (session) setIsLoggedIn(true);

                    // Fetch Weeks
                    const { data: weeksData } = await sb.from('san_sessions').select('week_name').order('week_name', { ascending: true });
                    if (weeksData && weeksData.length > 0) {
                        const wks = weeksData.map(w => w.week_name);
                        setSavedWeeks(wks);
                        const last = wks[wks.length - 1];
                        const { data: sessionData } = await sb.from('san_sessions').select('members').eq('week_name', last).single();
                        if (sessionData) setMembers(sessionData.members || []);
                        setActiveWeek(last);
                    }
                    setIsInitialLoading(false);
                };
                initData();

                // Listen for Auth changes
                const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
                    setIsLoggedIn(!!session);
                });
                return () => subscription.unsubscribe();
            }, []);

            useEffect(() => {
                const wks = generateWeeks(calYear, calMonth);
                setAvailableWeeks(wks);
                setTargetWeek(wks[0]);
            }, [calYear, calMonth]);

            useEffect(() => {
                if (isInitialLoading || !activeWeek) return;

                const sorted = [...members].sort((a, b) => (b.currentDuty || 0) - (a.currentDuty || 0));
                setTopDuty(sorted.slice(0, 3));

                let a = 0, i = 0, d = 0, m = 0;
                let rs = {
                    hc: { t: 0, a: 0 },
                    cmd: { t: 0, a: 0 },
                    spv: { t: 0, a: 0 },
                    staff: { t: 0, a: 0 },
                    intern: { t: 0, a: 0 }
                };

                members.forEach(p => {
                    const rStr = (p.rank || '').toLowerCase();
                    const rNum = parseInt(rStr.match(/\d+/)?.[0] || 0);
                    const isActive = p.currentDuty >= 200;

                    if (isActive) a++; else i++;
                    const exempt = rNum >= 9;
                    if (!exempt) {
                        if ((p.ip || 0) === 0) d++; else m++;
                    }

                    let group = null;
                    if (rNum >= 9) group = 'hc';
                    else if (rNum >= 6) group = 'cmd';
                    else if (rNum === 4 || rNum === 5 || (rNum === 3 && rStr.includes('prob'))) group = 'spv';
                    else if (rNum === 2 || rNum === 3) group = 'staff';
                    else if (rNum === 1) group = 'intern';

                    if (group) {
                        rs[group].t++;
                        if (isActive) rs[group].a++;
                    }
                });
                setStats({ total: members.length, active: a, inactive: i, disciplined: d, melanggar: m });
                setRankStats(rs);

                const syncData = async () => {
                    if (activeWeek && isLoggedIn) {
                        const { error } = await sb.from('san_sessions').upsert({ week_name: activeWeek, members: members }, { onConflict: 'week_name' });
                        if (error) console.error("Sync Error:", error);
                    }
                };
                syncData();
            }, [members, activeWeek, isLoggedIn, activeScreen]);

            // Charts
            useEffect(() => {
                if (!isLoggedIn || stats.total === 0) return;

                Chart.register(ChartDataLabels);

                const dark = document.documentElement.classList.contains('dark');
                const gridColor = dark ? 'rgba(255,255,255,0.06)' : '#e2e8f0';
                const tickColor = dark ? '#64748b' : '#64748b';
                const barLabelColor = dark ? '#e2e8f0' : '#1e293b';
                const legendColor = dark ? '#94a3b8' : '#64748b';

                const createChart = (id, type, data, colors, isPie = true) => {
                    const ctx = document.getElementById(id);
                    if (!ctx) return;

                    if (chartRefs.current[id]) chartRefs.current[id].destroy();

                    // Generate one specific color per bar if type is bar and colors is an array
                    const finalColors = !isPie && Array.isArray(colors) ? colors.slice(0, data.values.length) : colors;

                    const datasets = [{
                        data: data.values,
                        backgroundColor: finalColors,
                        hoverBackgroundColor: finalColors,
                        borderRadius: isPie ? 0 : 4,
                        borderWidth: isPie ? 1 : 0,
                        borderColor: '#ffffff',
                        barThickness: isPie ? undefined : 60,
                        hoverOffset: isPie ? 5 : 0,
                    }];

                    chartRefs.current[id] = new Chart(ctx, {
                        type,
                        data: {
                            labels: data.labels,
                            datasets: datasets
                        },
                        plugins: [ChartDataLabels],
                        options: {
                            indexAxis: 'x',
                            responsive: true,
                            maintainAspectRatio: false,
                            layout: {
                                padding: isPie ? { top: 10, bottom: 10 } : { top: 30, bottom: 5, left: -5, right: 0 }
                            },
                            animation: {
                                duration: 1500,
                                easing: 'easeOutQuart'
                            },
                            plugins: {
                                legend: {
                                    display: isPie,
                                    position: 'bottom',
                                    labels: {
                                        usePointStyle: false,
                                        boxWidth: 14,
                                        boxHeight: 14,
                                        padding: 25,
                                        font: { size: 13, weight: '500', family: "'Inter', sans-serif" },
                                        color: legendColor
                                    }
                                },
                                tooltip: {
                                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                                    backdropFilter: 'blur(12px)',
                                    padding: 16,
                                    titleFont: { size: 14, weight: 'bold', family: "'Outfit'" },
                                    bodyFont: { size: 13, weight: '500', family: "'Inter'" },
                                    cornerRadius: 12,
                                    displayColors: true,
                                },
                                datalabels: {
                                    color: isPie ? '#ffffff' : barLabelColor,
                                    anchor: isPie ? 'center' : 'end',
                                    align: isPie ? 'center' : 'end',
                                    offset: isPie ? 0 : 4,
                                    font: {
                                        weight: 'bold',
                                        size: isPie ? 18 : 13,
                                        family: "'Inter', sans-serif"
                                    },
                                    formatter: (value) => {
                                        if (isPie) return value;
                                        return value + 'm';
                                    }
                                }
                            },
                            scales: isPie ? {
                                x: { display: false },
                                y: { display: false }
                            } : {
                                y: {
                                    beginAtZero: true,
                                    border: { display: false },
                                    grid: { color: gridColor, drawBorder: false },
                                    ticks: { color: tickColor, font: { size: 12 }, padding: 8, maxTicksLimit: 6 }
                                },
                                x: {
                                    border: { display: false },
                                    grid: { display: false },
                                    ticks: { color: tickColor, font: { size: 13 }, padding: 8 }
                                }
                            }
                        }
                    });
                };

                const paletteKeaktifan = ['#22c55e', '#ef4444'];
                const paletteDisiplin = ['#3b82f6', '#f97316'];
                const paletteTop3 = ['#fbbf24', '#9ca3af', '#d97706'];

                createChart('chart1', 'pie', { labels: ['≥ 200m (Aktif)', '< 200m (Tidak Aktif)'], values: [stats.active, stats.inactive] }, paletteKeaktifan, true);
                createChart('chart2', 'pie', { labels: ['Disiplin (0 IP)', 'Melanggar (>0 IP)'], values: [stats.disciplined, stats.melanggar] }, paletteDisiplin, true);
                createChart('chart3', 'bar', { labels: topDuty.map(t => (t.name || '').split(' ')[0]), values: topDuty.map(t => t.currentDuty || 0) }, paletteTop3, false);
            }, [stats, topDuty, isLoggedIn, activeScreen, rankStats, isDarkMode]);

            // --- Handlers ---
            const showToast = (msg, type = 'success') => { setToast({ msg, type }); setTimeout(() => setToast(null), 3000); };

            const downloadChart = (chartId, filename) => {
                const canvas = document.getElementById(chartId);
                if (!canvas) return showToast("Gagal mengunduh diagram", "error");

                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const ctx = tempCanvas.getContext('2d');

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                ctx.drawImage(canvas, 0, 0);

                const link = document.createElement('a');
                link.download = filename + '.png';
                link.href = tempCanvas.toDataURL('image/png', 1.0);
                link.click();
                showToast("Diagram berhasil diunduh");
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                const { error } = await sb.auth.signInWithPassword({
                    email: loginEmail,
                    password: loginPass
                });
                if (error) showToast("Akses Ditolak: " + error.message, "error");
                else showToast("Login Berhasil");
            };

            const handleLogout = async () => { await sb.auth.signOut(); };

            const handleFileUpload = (type, e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });

                    if (type === 'members') {
                        const h = Object.keys(json[0] || {});
                        const bK = h.find(k => /badge/i.test(k)) || h[0];
                        const nK = h.find(k => /name|nama/i.test(k)) || h[1];
                        const rK = h.find(k => /rank|pangkat/i.test(k)) || h[2];
                        const list = json.map(r => ({ badge: r[bK], name: r[nK], rank: r[rK], ip: 0, currentDuty: 0 })).filter(m => m.name);
                        setMembers(list);
                        if (!savedWeeks.includes(targetWeek)) {
                            const newW = [...savedWeeks, targetWeek].sort();
                            setSavedWeeks(newW); localStorage.setItem('san_weeks', JSON.stringify(newW));
                        }
                        setActiveWeek(targetWeek);
                        showToast("Data Member Diimpor");
                    } else {
                        if (members.length === 0) return showToast("Upload Members Dulu", "error");
                        const h = Object.keys(json[0] || {});
                        const nK = h.find(k => /Staff|nama/i.test(k)) || h[0];
                        const dK = h.find(k => /duty/i.test(k)) || h[2];
                        const map = {};
                        json.forEach(r => {
                            const n = (r[nK] || '').toString().toLowerCase().trim();
                            const d = parseInt((r[dK] || '0').toString().replace(/\D/g, '')) || 0;
                            if (n) map[n] = (map[n] || 0) + d;
                        });
                        setMembers(prev => prev.map(m => {
                            const d = map[m.name.toLowerCase().trim()] || 0;
                            const exempt = m.rank && (m.rank.includes('[9]') || m.rank.includes('[10]'));
                            return { ...m, currentDuty: d, ip: (d < 200 && !exempt) ? (m.ip || 0) + 1 : m.ip };
                        }));
                        showToast("Aktivitas Berhasil Diproses");
                    }
                    e.target.value = null;
                };
                reader.readAsArrayBuffer(file);
            };

            const filteredMembers = useMemo(() => {
                let list = members.filter(m => (m.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || (m.badge || '').toLowerCase().includes(searchTerm.toLowerCase()));
                list.sort((a, b) => {
                    let vA = a[sort.key], vB = b[sort.key];
                    if (sort.key === 'rank') {
                        const getNum = s => parseInt((s || '').match(/\d+/)?.[0] || 0);
                        vA = getNum(vA); vB = getNum(vB);
                    } else if (typeof vA === 'string') {
                        vA = vA.toLowerCase();
                        vB = vB.toLowerCase();
                    }
                    if (vA === vB) return 0;
                    return sort.dir === 'asc' ? (vA < vB ? -1 : 1) : (vA < vB ? 1 : -1);
                });
                return list;
            }, [members, searchTerm, sort]);

            // --- Templates ---
            if (!isLoggedIn) return (
                <div className="min-h-screen bg-[#040812] flex items-center justify-center p-6 relative font-['Inter']">
                    <div className="absolute top-0 w-[600px] h-[300px] bg-indigo-600/10 blur-[100px] rounded-full pointer-events-none"></div>

                    <div className="w-full max-w-[460px] relative z-10">
                        <div className="bg-[#0D1224] border border-white/5 p-12 rounded-[48px] shadow-2xl relative">
                            <div className="text-center mb-10">
                                <div className="flex justify-center mb-6">
                                    <div className="w-24 h-24">
                                        <img src="https://i.imgur.com/hHQgKs9.png" className="w-full h-full object-contain" alt="Logo" />
                                    </div>
                                </div>
                                <h1 className="text-3xl font-black text-white mb-3 font-['Outfit'] tracking-tight">Internal Affairs Portal</h1>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-6">
                                <div className="space-y-2.5">
                                    <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-[2px] ml-1">Email</label>
                                    <div className="relative group/input">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 transition-colors">
                                            <Icon name="shield-check" className="w-5 h-5" />
                                        </div>
                                        <input
                                            type="email"
                                            value={loginEmail}
                                            onChange={e => setLoginEmail(e.target.value)}
                                            className="w-full bg-[#050914] border border-white/5 rounded-xl py-3 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500/50 transition-all text-sm font-medium"
                                            placeholder="admin@san.ia"
                                            required
                                        />
                                    </div>
                                </div>

                                <div className="space-y-2.5">
                                    <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-[2px] ml-1">Password</label>
                                    <div className="relative group/input">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 transition-colors">
                                            <Icon name="lock" className="w-5 h-5" />
                                        </div>
                                        <input
                                            type="password"
                                            value={loginPass}
                                            onChange={e => setLoginPass(e.target.value)}
                                            className="w-full bg-[#050914] border border-white/5 rounded-xl py-3 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500/50 transition-all font-mono tracking-[0.4em] text-sm"
                                            placeholder="••••••••"
                                            required
                                        />
                                    </div>
                                </div>

                                <div className="pt-2">
                                    <button className="w-full bg-[#5244E3] hover:bg-[#4336C9] text-white font-bold py-4 rounded-2xl shadow-[0_10px_30px_-10px_rgba(82,68,227,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                                        <span className="tracking-[3px] uppercase text-[11px] font-bold ml-2">Login</span>
                                        <Icon name="chevron-right" className="w-4 h-4" />
                                    </button>
                                </div>
                            </form>

                            {toast && toast.type === 'error' && (
                                <div className="mt-8 bg-rose-500/10 border border-rose-500/20 rounded-xl p-4 flex items-center gap-3 text-rose-400 text-sm">
                                    <Icon name="alert-triangle" className="w-4 h-4" />
                                    <span className="font-bold tracking-tight">{toast.msg}</span>
                                </div>
                            )}
                        </div>
                        <div className="flex flex-col items-center mt-10 space-y-4">
                            <p className="text-slate-600 text-[10px] font-black tracking-[3px] uppercase opacity-40">&copy; 2026 SAN Internal Affairs</p>
                            <div className="flex gap-4 opacity-30">
                                <div className="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex min-h-screen bg-[#f1f5f9] dark:bg-[#0b1120] text-slate-800 dark:text-slate-200 font-['Inter'] relative">
                    {/* Mobile Overlay */}
                    {isMobileMenuOpen && (
                        <div onClick={() => setIsMobileMenuOpen(false)} className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[55] lg:hidden transition-opacity"></div>
                    )}

                    {/* Clean Sidebar */}
                    <aside className={`w-[320px] h-screen fixed top-0 left-0 bg-white dark:bg-[#0D1224] border-r border-slate-100 dark:border-white/5 p-8 flex flex-col z-[60] transition-transform duration-300 lg:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        {/* Logo Area */}
                        <div className="flex items-center gap-3 mb-16">
                            <div className="w-12 h-12 flex items-center justify-center shrink-0">
                                <img src="https://i.imgur.com/hHQgKs9.png" className="w-full h-full object-contain" alt="Logo" />
                            </div>
                            <span className="text-[22px] font-black font-['Outfit'] tracking-tight text-slate-900 dark:text-white leading-none">SAN Internal Affairs</span>
                            <button onClick={() => setIsMobileMenuOpen(false)} className="lg:hidden ml-auto p-2 text-slate-400 hover:text-slate-600">
                                <Icon name="x" className="w-6 h-6" />
                            </button>
                        </div>

                        <div className="flex-1 space-y-12 overflow-y-auto no-scrollbar">
                            {/* Controls Area */}
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Bulan</label>
                                        <div className="relative">
                                            <select value={calMonth} onChange={e => setCalMonth(Number(e.target.value))} className="w-full bg-slate-50/50 dark:bg-slate-800/50 border border-slate-200 dark:border-white/5 rounded-xl h-11 px-4 text-[13px] font-semibold text-slate-700 dark:text-slate-300 outline-none focus:bg-white dark:focus:bg-slate-800 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-500/10 transition-all appearance-none cursor-pointer">
                                                {['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'].map((m, i) => <option key={i} value={i}>{m}</option>)}
                                            </select>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
                                                <Icon name="chevron-down" className="w-4 h-4" />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Tahun</label>
                                        <div className="relative">
                                            <select value={calYear} onChange={e => setCalYear(Number(e.target.value))} className="w-full bg-slate-50/50 dark:bg-slate-800/50 border border-slate-200 dark:border-white/5 rounded-xl h-11 px-4 text-[13px] font-semibold text-slate-700 dark:text-slate-300 outline-none focus:bg-white dark:focus:bg-slate-800 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-500/10 transition-all appearance-none cursor-pointer">
                                                {[2025, 2026, 2027, 2028].map(y => <option key={y} value={y}>{y}</option>)}
                                            </select>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
                                                <Icon name="chevron-down" className="w-4 h-4" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Pilih Periode</label>
                                    <div className="relative">
                                        <select value={targetWeek} onChange={e => setTargetWeek(e.target.value)} className="w-full bg-slate-50/50 dark:bg-slate-800/50 border border-slate-200 dark:border-white/5 rounded-xl h-11 px-4 text-[13px] font-semibold text-slate-700 dark:text-slate-300 outline-none focus:bg-white dark:focus:bg-slate-800 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-500/10 transition-all appearance-none cursor-pointer">
                                            {availableWeeks.map(w => <option key={w} value={w}>{w}</option>)}
                                        </select>
                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
                                            <Icon name="chevron-down" className="w-4 h-4" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="w-full h-px bg-slate-100 dark:bg-white/5"></div>

                            {/* Data Management Area */}
                            <div>
                                <div className="text-[11px] font-bold text-slate-400 uppercase tracking-[2px] mb-6">Manajemen Data</div>
                                <div className="space-y-5">
                                    <label className="flex items-center gap-5 cursor-pointer group">
                                        <div className="w-12 h-12 rounded-[14px] bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center group-hover:bg-emerald-100 dark:group-hover:bg-emerald-900/40 transition-colors">
                                            <Icon name="users" className="w-5 h-5" />
                                        </div>
                                        <span className="text-[15px] font-bold text-slate-700 dark:text-slate-300 group-hover:text-emerald-700 dark:group-hover:text-emerald-400 transition-colors flex items-center gap-2">
                                            Impor Staff
                                            <Icon name="file-down" className="w-4 h-4 text-slate-400" />
                                        </span>
                                        <input type="file" className="hidden" accept=".xlsx" onChange={e => handleFileUpload('members', e)} />
                                    </label>

                                    <label className="flex items-center gap-5 cursor-pointer group">
                                        <div className="w-12 h-12 rounded-[14px] bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 flex items-center justify-center group-hover:bg-indigo-100 dark:group-hover:bg-indigo-900/40 transition-colors">
                                            <Icon name="activity" className="w-5 h-5" />
                                        </div>
                                        <span className="text-[15px] font-bold text-slate-700 dark:text-slate-300 group-hover:text-indigo-700 dark:group-hover:text-indigo-400 transition-colors flex items-center gap-2">
                                            Sinkron Aktivitas
                                            <Icon name="file-up" className="w-4 h-4 text-slate-400" />
                                        </span>
                                        <input type="file" className="hidden" accept=".xlsx" onChange={e => handleFileUpload('activity', e)} />
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div className="mt-auto pt-8 border-t border-slate-100 dark:border-white/5 w-full">
                            <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2.5 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-800/50 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 font-bold text-xs transition-colors group tracking-[1px]">
                                <Icon name="power" className="w-4 h-4" />
                                <span className="uppercase">Logout</span>
                            </button>
                        </div>
                    </aside>

                    {/* Content Wrapper */}
                    <main className="lg:ml-80 flex-1 p-6 md:p-12 min-w-0 main-gradient">
                        {/* High-End Header */}
                        <header className="flex flex-col xl:flex-row xl:items-center justify-between mb-10 gap-6">
                            <div className="flex items-center justify-between xl:justify-start gap-4">
                                <button onClick={() => setIsMobileMenuOpen(true)} className="lg:hidden p-3 bg-white border border-slate-200 rounded-xl shadow-sm hover:bg-slate-50">
                                    <Icon name="menu" className="w-6 h-6 text-slate-600" />
                                </button>
                                <div className="space-y-1.5">
                                    <h1 className="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white font-['Outfit'] tracking-tight group">
                                        Internal Affairs Dashboard
                                        <span className="inline-block ml-2 w-2 h-2 rounded-full bg-emerald-500 animate-pulse align-middle"></span>
                                    </h1>
                                    <div className="flex items-center gap-3">
                                        <div className="flex items-center gap-2.5 px-3.5 py-1.5 bg-slate-100/80 dark:bg-slate-800/80 backdrop-blur-sm border border-slate-200 dark:border-slate-700/50 rounded-2xl">
                                            <Icon name="clock" className="w-3.5 h-3.5 text-slate-500 dark:text-slate-400" />
                                            <span className="text-[10px] font-bold text-slate-600 dark:text-slate-400 whitespace-nowrap uppercase tracking-wider">Periode: {activeWeek || 'Menunggu Sinkron...'}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-4">

                                <button
                                    onClick={toggleTheme}
                                    className="p-3 bg-white dark:bg-[#0B1224] border border-slate-200 dark:border-white/5 rounded-2xl shadow-sm hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-all text-slate-500 dark:text-slate-400 group flex items-center justify-center"
                                    title="Toggle Dark Mode"
                                >
                                    <Icon name={isDarkMode ? "sun" : "moon"} className="w-5 h-5 group-hover:scale-110 transition-transform" />
                                </button>

                                {savedWeeks.length > 0 && (
                                    <div className="relative">
                                        <select
                                            value={activeWeek}
                                            onChange={async (e) => {
                                                const val = e.target.value;
                                                setIsInitialLoading(true); // Temporary block sync
                                                setActiveWeek(val);
                                                const { data: session } = await sb.from('san_sessions').select('members').eq('week_name', val).single();
                                                if (session) setMembers(session.members || []);
                                                setIsInitialLoading(false);
                                            }}
                                            className="appearance-none bg-white dark:bg-[#0B1224] border border-slate-200 dark:border-white/5 rounded-2xl py-3 pl-5 pr-12 text-sm font-bold text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all shadow-sm cursor-pointer"
                                        >
                                            <option value="">Riwayat Log</option>
                                            {savedWeeks.map(w => <option key={w} value={w}>{w}</option>)}
                                        </select>
                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                            <Icon name="history" className="w-4 h-4" />
                                        </div>
                                    </div>
                                )}
                            </div>
                        </header>

                        <div className="fade-in space-y-12">
                            {/* Insane Stats Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                {[
                                    { l: 'Total Staff', v: stats.total, i: 'users-2', ic: 'text-indigo-600', bg: 'bg-indigo-50/50', trend: 'Live', color: '#6366f1', tt: 'Data diperbarui secara langsung dari sesi aktif' },
                                    { l: 'Aktif (≥200m)', v: stats.active, i: 'zap', ic: 'text-emerald-600', bg: 'bg-emerald-50/50', trend: `${stats.total > 0 ? Math.round((stats.active / stats.total) * 100) : 0}%`, color: '#10b981', tt: `${stats.total > 0 ? Math.round((stats.active / stats.total) * 100) : 0}% dari total staff telah memenuhi minimal 200 menit duty` },
                                    { l: 'Disiplin (0 IP)', v: stats.disciplined, i: 'shield-check', ic: 'text-sky-600', bg: 'bg-sky-50/50', trend: `${stats.total > 0 ? Math.round((stats.disciplined / stats.total) * 100) : 0}%`, color: '#0ea5e9', tt: `${stats.total > 0 ? Math.round((stats.disciplined / stats.total) * 100) : 0}% dari total staff tidak memiliki poin penalti IP` },
                                    { l: 'Melanggar (>0 IP)', v: stats.melanggar, i: 'alert-octagon', ic: 'text-rose-600', bg: 'bg-rose-50/50', trend: `${stats.total > 0 ? Math.round((stats.melanggar / stats.total) * 100) : 0}%`, color: '#f43f5e', tt: `${stats.total > 0 ? Math.round((stats.melanggar / stats.total) * 100) : 0}% dari total staff memiliki poin penalti IP aktif` }
                                ].map((s, i) => (
                                    <div key={i} className="stat-card">
                                        <div className="absolute -right-6 -top-6 opacity-[0.03] group-hover:opacity-[0.08] group-hover:scale-150 group-hover:rotate-12 transition-all duration-1000 pointer-events-none overflow-hidden rounded-full">
                                            <Icon name={s.i} className="w-48 h-48" />
                                        </div>
                                        <div className="flex items-center justify-between mb-6 relative z-10">
                                            <div className={`w-14 h-14 rounded-2xl ${s.bg} ${s.ic} dark:bg-white/5 flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-all duration-500 shadow-sm`}>
                                                <Icon name={s.i} className="w-7 h-7" />
                                            </div>
                                            <div className="flex flex-col items-end">
                                                <div className="relative group/tip">
                                                    <span className={`text-[10px] font-black px-2.5 py-1 rounded-lg cursor-default ${i === 0 ? 'bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400' : i === 3 ? 'bg-rose-50 dark:bg-rose-900/40 text-rose-600 dark:text-rose-400' : 'bg-emerald-50 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400'} uppercase tracking-wider`}>
                                                        {s.trend}
                                                    </span>
                                                    {/* Tooltip */}
                                                    <div className="absolute right-0 bottom-full mb-2 z-50 w-52 bg-slate-900 dark:bg-slate-800 text-white text-[11px] font-medium leading-relaxed px-3.5 py-2.5 rounded-xl shadow-xl border border-white/10 opacity-0 invisible group-hover/tip:opacity-100 group-hover/tip:visible transition-all duration-200 pointer-events-none">
                                                        <div className="absolute -bottom-1.5 right-4 w-3 h-3 bg-slate-900 dark:bg-slate-800 border-b border-r border-white/10 rotate-45"></div>
                                                        {s.tt}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="relative z-10">
                                            <p className="text-[11px] font-bold text-slate-400 uppercase tracking-[1.5px] mb-1.5">{s.l}</p>
                                            <div className="flex items-baseline gap-2">
                                                <h3 className="text-4xl font-black text-slate-900 dark:text-white group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors font-['Outfit'] tabular-nums leading-none">{s.v}</h3>
                                                <span className="text-[10px] font-bold text-slate-400">Staff</span>
                                            </div>
                                        </div>
                                        <div className="mt-8 flex items-center gap-2 relative z-10">
                                            <div className="flex-1 h-2 bg-slate-100/50 dark:bg-slate-800/50 rounded-full overflow-hidden">
                                                <div
                                                    className="h-full rounded-full transition-all duration-1000 ease-out relative"
                                                    style={{
                                                        width: `${(s.v / (stats.total || 1)) * 100}%`,
                                                        backgroundColor: s.color,
                                                        boxShadow: `0 0 15px ${s.color}66`
                                                    }}
                                                >
                                                    <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent animate-[shimmer_2s_infinite]"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Modern Charts Frame */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* Diagram Keaktifan */}
                                <div className="bg-white dark:bg-[#0B1224] p-6 rounded-2xl border border-slate-100 dark:border-white/5 shadow-sm dark:shadow-none flex flex-col hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-slate-800 dark:text-white font-bold text-lg">Diagram Keaktifan</h3>
                                        <button onClick={() => downloadChart('chart1', 'Diagram_Keaktifan')} className="text-slate-400 hover:text-indigo-600 transition-colors" title="Download Diagram Keaktifan">
                                            <Icon name="download" className="w-4 h-4" />
                                        </button>
                                    </div>
                                    <div className="flex-1 w-full relative min-h-[260px] flex items-center justify-center">
                                        {stats.total > 0 ? <canvas id="chart1"></canvas> : <div className="text-slate-400 text-sm">Menunggu data...</div>}
                                    </div>
                                </div>

                                {/* Diagram Disiplin */}
                                <div className="bg-white dark:bg-[#0B1224] p-6 rounded-2xl border border-slate-100 dark:border-white/5 shadow-sm dark:shadow-none flex flex-col hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-slate-800 dark:text-white font-bold text-lg">Diagram Disiplin</h3>
                                        <button onClick={() => downloadChart('chart2', 'Diagram_Disiplin')} className="text-slate-400 hover:text-indigo-600 transition-colors" title="Download Diagram Disiplin">
                                            <Icon name="download" className="w-4 h-4" />
                                        </button>
                                    </div>
                                    <div className="flex-1 w-full relative min-h-[260px] flex items-center justify-center">
                                        {stats.total > 0 ? <canvas id="chart2"></canvas> : <div className="text-slate-400 text-sm">Menunggu data...</div>}
                                    </div>
                                </div>

                                {/* Top 3 Terlama */}
                                <div className="bg-white dark:bg-[#0B1224] p-6 rounded-2xl border border-slate-100 dark:border-white/5 shadow-sm dark:shadow-none flex flex-col hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-slate-800 dark:text-white font-bold text-lg flex items-center gap-2">
                                            <Icon name="award" className="w-5 h-5 text-amber-500" />
                                            Top 3 Duty Time
                                        </h3>
                                        <button onClick={() => downloadChart('chart3', 'Top_3_Terlama')} className="text-slate-400 hover:text-indigo-600 transition-colors" title="Download Top 3">
                                            <Icon name="download" className="w-4 h-4" />
                                        </button>
                                    </div>
                                    <div className="flex-1 w-full relative min-h-[260px] flex items-center justify-center mt-2">
                                        {stats.total > 0 ? <canvas id="chart3"></canvas> : <div className="text-slate-400 text-sm">Sedang memproses...</div>}
                                    </div>
                                </div>
                            </div>


                            {/* High-Performance Table */}
                            <div className="bg-white dark:bg-[#0B1224] rounded-[40px] border border-slate-100 dark:border-white/5 shadow-2xl shadow-slate-200/50 dark:shadow-none overflow-hidden font-['Inter']">
                                <div className="p-10 border-b border-slate-50 dark:border-slate-800/50 bg-slate-50/30 dark:bg-slate-800/20 flex flex-col md:flex-row md:items-center justify-between gap-6">
                                    <div className="flex items-center gap-5">
                                        <div className="w-14 h-14 bg-indigo-600 text-white rounded-[20px] flex items-center justify-center shadow-lg shadow-indigo-200 dark:shadow-indigo-900/50">
                                            <Icon name="database" className="w-7 h-7" />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold font-['Outfit'] tracking-tight text-slate-900 dark:text-white">Database Staff</h3>
                                            <div className="flex items-center gap-2 mt-0.5">
                                                <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                                                <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest leading-none">{filteredMembers.length} Personel Terdaftar</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-4 flex-1 justify-end">
                                        <div className="relative group w-full sm:w-auto">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                                                <Icon name="search" className="w-5 h-5" />
                                            </div>
                                            <input
                                                type="text"
                                                placeholder="Cari Staff..."
                                                value={searchTerm}
                                                onChange={e => setSearchTerm(e.target.value)}
                                                className="w-full sm:w-64 md:w-72 bg-white dark:bg-slate-800/60 border border-slate-200 dark:border-white/10 rounded-2xl py-3 pl-12 pr-4 text-sm font-medium text-slate-800 dark:text-slate-200 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 dark:focus:border-indigo-500/60 transition-all shadow-sm"
                                            />
                                        </div>

                                        <button
                                            onClick={() => {
                                                const exportData = members.map(m => ({
                                                    "Badge": String(m.badge),
                                                    "Nama Staff": m.name,
                                                    "Pangkat": m.rank,
                                                    "Waktu Duty (Menit)": m.currentDuty || 0,
                                                    "Total IP": m.ip || 0
                                                }));
                                                const ws = XLSX.utils.json_to_sheet(exportData);
                                                const wb = XLSX.utils.book_new();
                                                XLSX.utils.book_append_sheet(wb, ws, "Database");
                                                XLSX.writeFile(wb, `IA_Export_${activeWeek.replace(/\s/g, '_')}.xlsx`);
                                            }}
                                            className="btn-primary group !py-3.5 !px-8 !rounded-2xl whitespace-nowrap"
                                        >
                                            <Icon name="download-cloud" className="w-5 h-5 group-hover:-translate-y-1 transition-transform" />
                                            <span className="text-[11px] tracking-[2px] font-bold uppercase">Export Data</span>
                                        </button>
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50/80 dark:bg-slate-800/50">
                                                {[
                                                    { l: 'Staff', k: 'name' },
                                                    { l: 'Rank', k: 'rank' },
                                                    { l: 'Aktivitas', k: 'currentDuty' },
                                                    { l: 'Penalti IP', k: 'ip' },
                                                    { l: 'Manajemen IP', k: null }
                                                ].map((col, i) => (
                                                    <th key={i} onClick={() => col.k && setSort({ key: col.k, dir: sort.key === col.k && sort.dir === 'asc' ? 'desc' : 'asc' })} className="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-[3px] cursor-pointer hover:bg-white dark:hover:bg-[#0B1224] transition-all group first:pl-12 last:pr-12 relative">
                                                        <div className="flex items-center gap-3 relative z-10">
                                                            <span>{col.l}</span>
                                                            {col.k && (
                                                                <div className={`transition-all duration-300 ${sort.key === col.k ? 'opacity-100 text-indigo-600 scale-125' : 'opacity-0 translate-y-1 group-hover:opacity-100 group-hover:translate-y-0'}`}>
                                                                    <Icon name={sort.dir === 'asc' ? 'arrow-up-narrow-wide' : 'arrow-down-wide-narrow'} className="w-4 h-4" />
                                                                </div>
                                                            )}
                                                        </div>
                                                        {sort.key === col.k && <div className="absolute bottom-0 left-10 right-10 h-0.5 bg-indigo-500 rounded-full shadow-[0_-2px_8px_rgba(99,102,241,0.4)]"></div>}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50 dark:divide-slate-800/50">
                                            {filteredMembers.map((m, idx) => (
                                                <tr key={idx} onClick={() => setSelectedMember(m)} className="hover:bg-slate-50/80 dark:hover:bg-slate-800/50 transition-all duration-300 group cursor-pointer">
                                                    <td className="px-10 py-6 first:pl-12">
                                                        <div className="flex flex-col">
                                                            <span className="text-sm font-bold text-slate-900 dark:text-slate-200 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">{m.name}</span>
                                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">#{m.badge}</span>
                                                        </div>
                                                    </td>
                                                    <td className="px-10 py-6">
                                                        <span className="inline-flex px-3.5 py-1.5 rounded-xl text-[9px] font-black uppercase bg-white dark:bg-[#0B1224] text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-white/5 shadow-sm group-hover:border-indigo-200 dark:group-hover:border-indigo-500/30 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-all">
                                                            {m.rank}
                                                        </span>
                                                    </td>
                                                    <td className="px-10 py-6">
                                                        {m.rank && (m.rank.includes('[9]') || m.rank.includes('[10]')) ? (
                                                            <div className="flex flex-col">
                                                                <div className="inline-flex items-center gap-2 px-3 py-1 rounded-xl font-bold text-[11px] bg-slate-100 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 border border-slate-200/50 dark:border-slate-700/50 w-fit">
                                                                    <Icon name="shield-off" className="w-3.5 h-3.5" />
                                                                    Dikecualikan
                                                                </div>
                                                                <span className="text-[10px] font-bold text-slate-400 ml-1.5 mt-1">{m.currentDuty} Menit</span>
                                                            </div>
                                                        ) : (
                                                            <div className="flex flex-col gap-1.5">
                                                                <div className={`inline-flex items-center gap-2 px-3 py-1 rounded-xl font-bold text-[11px] w-fit ${m.currentDuty >= 200 ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400' : 'bg-rose-50 dark:bg-rose-900/20 text-rose-700 dark:text-rose-400'}`}>
                                                                    <div className={`w-1.5 h-1.5 rounded-full ${m.currentDuty >= 200 ? 'bg-emerald-500' : 'bg-rose-500 shadow-[0_0_12px_rgba(244,63,94,0.4)] animate-pulse'}`}></div>
                                                                    {m.currentDuty} Menit
                                                                </div>
                                                                <div className="w-24 h-1 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                                                    <div
                                                                        className={`h-full rounded-full transition-all duration-1000 ${m.currentDuty >= 200 ? 'bg-emerald-500' : 'bg-rose-500'}`}
                                                                        style={{ width: `${Math.min(100, (m.currentDuty / 200) * 100)}%` }}
                                                                    ></div>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="px-10 py-6">
                                                        <div className={`w-10 h-10 rounded-[14px] flex items-center justify-center text-[11px] font-black border-2 transition-all duration-300 ${m.ip >= 10 ? 'bg-rose-600 text-white border-rose-500 shadow-lg shadow-rose-200' : m.ip > 0 ? 'bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 border-amber-200 dark:border-amber-700/40' : 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 border-emerald-200 dark:border-emerald-700/40'}`}>
                                                            {m.ip || 0}
                                                        </div>
                                                    </td>
                                                    <td className="px-10 py-6 last:pr-12">
                                                        <div className="flex items-center gap-2">
                                                            <button
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    setMembers(prev => prev.map(p => p.name === m.name ? { ...p, ip: Math.max(0, (p.ip || 0) - 1) } : p));
                                                                }}
                                                                className="w-8 h-8 rounded-full bg-white dark:bg-[#0B1224] border border-slate-200 dark:border-white/5 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-all flex items-center justify-center active:scale-95"
                                                            >
                                                                <Icon name="minus" className="w-4 h-4" />
                                                            </button>
                                                            <button
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    setMembers(prev => prev.map(p => p.name === m.name ? { ...p, ip: (p.ip || 0) + 1 } : p));
                                                                }}
                                                                className="w-8 h-8 rounded-full bg-white dark:bg-[#0B1224] border border-slate-200 dark:border-white/5 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-all flex items-center justify-center active:scale-95"
                                                            >
                                                                <Icon name="plus" className="w-4 h-4" />
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Staff Detail Modal */}
                    {selectedMember && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/60 dark:bg-slate-900/80 backdrop-blur-sm">
                            <div className="bg-white dark:bg-[#0D1224] rounded-[40px] border border-slate-100 dark:border-white/5 shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto no-scrollbar p-10 font-['Inter']">
                                <div className="flex items-center justify-between pb-8 border-b border-slate-100 dark:border-white/5 mb-10">
                                    <div className="flex items-center gap-5">
                                        <div className="w-16 h-16 rounded-[24px] bg-indigo-600 flex items-center justify-center text-white shadow-xl shadow-indigo-200">
                                            <Icon name="user" className="w-8 h-8" />
                                        </div>
                                        <div>
                                            <h2 className="text-3xl font-black text-slate-900 dark:text-white mb-1 font-['Outfit']">{selectedMember.name}</h2>
                                            <p className="text-slate-400 font-bold uppercase tracking-[2px] text-xs">Badge #{selectedMember.badge} • {selectedMember.rank}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedMember(null)} className="w-14 h-14 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-white/5 flex items-center justify-center text-slate-400 hover:text-rose-500 hover:border-rose-100 dark:hover:border-rose-900 transition-all hover:scale-110 active:scale-95 shadow-sm">
                                        <Icon name="x" className="w-6 h-6" />
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                    {[
                                        {
                                            l: 'Progres Aktivitas',
                                            v: `${selectedMember.currentDuty}m`,
                                            i: 'zap',
                                            ic: 'text-indigo-600',
                                            bg: 'bg-indigo-50/50',
                                            trend: `${Math.min(100, Math.round((selectedMember.currentDuty / 200) * 100))}%`,
                                            color: '#6366f1',
                                            val: Math.min(100, (selectedMember.currentDuty / 200) * 100)
                                        },
                                        {
                                            l: 'Status Disiplin',
                                            v: `${selectedMember.ip} IP`,
                                            i: 'shield-check',
                                            ic: selectedMember.ip === 0 ? 'text-emerald-600' : 'text-rose-600',
                                            bg: selectedMember.ip === 0 ? 'bg-emerald-50/50' : 'bg-rose-50/50',
                                            trend: selectedMember.ip === 0 ? 'SAFE' : 'VIOLATED',
                                            color: selectedMember.ip === 0 ? '#10b981' : '#f43f5e',
                                            val: selectedMember.ip === 0 ? 100 : 0
                                        },
                                        {
                                            l: 'Status Akun',
                                            v: selectedMember.currentDuty >= 200 ? 'Active' : 'Missing',
                                            i: 'activity',
                                            ic: selectedMember.currentDuty >= 200 ? 'text-sky-600' : 'text-amber-600',
                                            bg: selectedMember.currentDuty >= 200 ? 'bg-sky-50/50' : 'bg-amber-50/50',
                                            trend: selectedMember.currentDuty >= 200 ? 'VERIFIED' : 'PENDING',
                                            color: selectedMember.currentDuty >= 200 ? '#0ea5e9' : '#f59e0b',
                                            val: selectedMember.currentDuty >= 200 ? 100 : 50
                                        },
                                        {
                                            l: 'Hierarchy Level',
                                            v: (() => {
                                                const rStr = (selectedMember.rank || '').toLowerCase();
                                                const rNum = parseInt(rStr.match(/\d+/)?.[0] || 0);
                                                if (rNum >= 9) return 'High Command';
                                                if (rNum >= 6) return 'Command';
                                                if (rNum === 4 || rNum === 5 || (rNum === 3 && rStr.includes('prob'))) return 'Supervisor';
                                                if (rNum === 2 || rNum === 3) return 'Staff';
                                                if (rNum === 1) return 'Internship';
                                                return 'N/A';
                                            })(),
                                            i: 'layout-grid',
                                            ic: 'text-indigo-600',
                                            bg: 'bg-indigo-50/50',
                                            trend: 'ROSTER',
                                            color: '#6366f1',
                                            val: 100
                                        }
                                    ].map((s, i) => (
                                        <div key={i} className="stat-card">
                                            <div className="absolute -right-6 -top-6 opacity-[0.03] pointer-events-none">
                                                <Icon name={s.i} className="w-48 h-48" />
                                            </div>
                                            <div className="flex items-center justify-between mb-6 relative z-10">
                                                <div className={`w-14 h-14 rounded-2xl ${s.bg} dark:bg-white/5 ${s.ic} flex items-center justify-center shadow-sm`}>
                                                    <Icon name={s.i} className="w-7 h-7" />
                                                </div>
                                                <div className="flex flex-col items-end">
                                                    <span className={`text-[10px] font-black px-2.5 py-1 rounded-lg ${s.ic.includes('rose') ? 'bg-rose-100 dark:bg-rose-900/40 text-rose-600 dark:text-rose-400' :
                                                        s.ic.includes('emerald') ? 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400' :
                                                            s.ic.includes('amber') ? 'bg-amber-100 dark:bg-amber-900/40 text-amber-600 dark:text-amber-400' :
                                                                'bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400'
                                                        } uppercase tracking-wider`}>
                                                        {s.trend}
                                                    </span>
                                                </div>
                                            </div>
                                            <div className="relative z-10">
                                                <p className="text-[11px] font-bold text-slate-400 uppercase tracking-[1.5px] mb-1.5">{s.l}</p>
                                                <h3 className="text-3xl font-black text-slate-900 dark:text-white font-['Outfit'] tabular-nums leading-none">{s.v}</h3>
                                            </div>
                                            <div className="mt-8 flex items-center gap-2 relative z-10">
                                                <div className="flex-1 h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                                    <div
                                                        className="h-full rounded-full transition-all duration-1000 ease-out"
                                                        style={{ width: `${s.val}%`, backgroundColor: s.color }}
                                                    ></div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {toast && (
                        <div className="fixed bottom-12 right-12 z-[100] font-['Inter']">
                            <div className={`px-8 py-5 rounded-[24px] glass border shadow-2xl flex items-center gap-5 transition-all ${toast.type === 'error' ? 'bg-rose-500 text-white border-rose-400' : 'bg-slate-900 text-white border-slate-700'}`}>
                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${toast.type === 'error' ? 'bg-white/20' : 'bg-indigo-500 shadow-lg shadow-indigo-500/30'}`}>
                                    <Icon name={toast.type === 'error' ? 'alert-octagon' : 'info'} className="w-5 h-5" />
                                </div>
                                <div className="pr-4">
                                    <p className="text-[10px] font-black uppercase tracking-[2px] opacity-60 mb-0.5">{toast.type === 'error' ? 'Status Alert' : 'System Notice'}</p>
                                    <p className="text-sm font-bold tracking-tight">{toast.msg}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
