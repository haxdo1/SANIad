<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAN | Internal Affairs Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#4f46e5',
                        dark: '#0f172a',
                        'dark-lighter': '#1e293b',
                        accent: '#10b981'
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts: Inter & Outfit -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-[#f1f5f9] text-slate-800 antialiased font-['Inter']; }
            h1, h2, h3, .font-heading { @apply font-['Outfit']; }
        }
        @layer components {
            .glass { @apply bg-white/80 backdrop-blur-md border border-white/20; }
            .card-sidebar { @apply transition-all duration-300 hover:bg-slate-100 rounded-xl px-4 py-3 flex items-center gap-3 text-slate-500 font-medium cursor-pointer; }
            .card-sidebar.active { @apply bg-indigo-600 text-white shadow-lg shadow-indigo-200; }
            .stat-card { @apply bg-white p-6 rounded-3xl border border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)] hover:shadow-[0_20px_50px_rgba(99,102,241,0.12)] hover:-translate-y-2 transition-all duration-500 relative overflow-hidden; }
            .btn-primary { @apply bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-semibold transition-all shadow-lg shadow-indigo-100 hover:shadow-indigo-200 active:scale-95 flex items-center justify-center gap-2; }
            .input-modern { @apply w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:bg-white focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all; }
            .chart-container { @apply bg-white p-8 md:p-10 rounded-[48px] border border-slate-100 shadow-[0_10px_40px_rgba(0,0,0,0.03)] hover:shadow-[0_20px_60px_rgba(79,70,229,0.08)] transition-all duration-700; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { @apply bg-slate-200 rounded-full hover:bg-slate-300; }
        
        .chart-glow {
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.2));
        }
        .stat-glow {
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.05);
        }
        .main-gradient {
            background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(79, 70, 229, 0.02) 0%, transparent 50%);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const supabaseUrl = 'https://kllfgqviatusjerecemj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsbGZncXZpYXR1c2plcmVjZW1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NjQ3ODUsImV4cCI6MjA4NzA0MDc4NX0.naHtlVQQdnTiwtfuyRLdyJnws-qu6ky8mnYdOkKwk2E';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        const Icon = ({ name, className = "", ...props }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && name) {
                    ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({ targets: [ref.current] });
                }
            }, [name]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} {...props}></span>;
        };

        // --- Utils ---
        const getWeekRange = (dateObj = new Date()) => {
            const date = new Date(dateObj.getTime());
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(date.setDate(diff));
            const sunday = new Date(monday.getTime()); sunday.setDate(monday.getDate() + 6);
            return `${monday.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })} - ${sunday.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}`;
        };

        const generateWeeks = (year, month) => {
            const weeks = [];
            let date = new Date(year, month, 1);
            let day = date.getDay();
            let diff = date.getDate() - day + (day === 0 ? -6 : 1);
            date.setDate(diff);
            for (let i = 0; i < 6; i++) {
                const w = getWeekRange(new Date(date));
                if (!weeks.includes(w)) weeks.push(w);
                date.setDate(date.getDate() + 7);
                if (date.getMonth() !== month && weeks.length >= 4) break;
            }
            return weeks;
        };

        // --- App Component ---
        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [loginEmail, setLoginEmail] = useState("");
            const [loginPass, setLoginPass] = useState("");
            const [activeScreen, setActiveScreen] = useState("dashboard");
            const [toast, setToast] = useState(null);
            const [isInitialLoading, setIsInitialLoading] = useState(true);

            // Data States
            const [savedWeeks, setSavedWeeks] = useState([]);
            const [activeWeek, setActiveWeek] = useState("");
            const [members, setMembers] = useState([]);
            const [stats, setStats] = useState({ total: 0, active: 0, inactive: 0, disciplined: 0, melanggar: 0 });
            const [rankStats, setRankStats] = useState({
                hc: { t: 0, a: 0 },
                cmd: { t: 0, a: 0 },
                spv: { t: 0, a: 0 },
                staff: { t: 0, a: 0 },
                intern: { t: 0, a: 0 }
            });
            const [selectedMember, setSelectedMember] = useState(null);
            const [topDuty, setTopDuty] = useState([]);

            // Search & Sort
            const [searchTerm, setSearchTerm] = useState("");
            const [sort, setSort] = useState({ key: 'name', dir: 'asc' });

            // Calendar
            const [calYear, setCalYear] = useState(new Date().getFullYear());
            const [calMonth, setCalMonth] = useState(new Date().getMonth());
            const [availableWeeks, setAvailableWeeks] = useState([]);
            const [targetWeek, setTargetWeek] = useState("");
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const chartRefs = useRef({});

            // --- Effects ---
            useEffect(() => {
                const initData = async () => {
                    // Check Session
                    const { data: { session } } = await sb.auth.getSession();
                    if (session) setIsLoggedIn(true);

                    // Fetch Weeks
                    const { data: weeksData } = await sb.from('san_sessions').select('week_name').order('week_name', { ascending: true });
                    if (weeksData && weeksData.length > 0) {
                        const wks = weeksData.map(w => w.week_name);
                        setSavedWeeks(wks);
                        const last = wks[wks.length - 1];
                        const { data: sessionData } = await sb.from('san_sessions').select('members').eq('week_name', last).single();
                        if (sessionData) setMembers(sessionData.members || []);
                        setActiveWeek(last);
                    }
                    setIsInitialLoading(false);
                };
                initData();

                // Listen for Auth changes
                const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
                    setIsLoggedIn(!!session);
                });
                return () => subscription.unsubscribe();
            }, []);

            useEffect(() => {
                const wks = generateWeeks(calYear, calMonth);
                setAvailableWeeks(wks);
                setTargetWeek(wks[0]);
            }, [calYear, calMonth]);

            useEffect(() => {
                if (isInitialLoading || !activeWeek) return;

                const sorted = [...members].sort((a, b) => (b.currentDuty || 0) - (a.currentDuty || 0));
                setTopDuty(sorted.slice(0, 3));

                let a = 0, i = 0, d = 0, m = 0;
                let rs = {
                    hc: { t: 0, a: 0 },
                    cmd: { t: 0, a: 0 },
                    spv: { t: 0, a: 0 },
                    staff: { t: 0, a: 0 },
                    intern: { t: 0, a: 0 }
                };

                members.forEach(p => {
                    const rStr = (p.rank || '').toLowerCase();
                    const rNum = parseInt(rStr.match(/\d+/)?.[0] || 0);
                    const isActive = p.currentDuty >= 200;

                    if (isActive) a++; else i++;
                    const exempt = rNum >= 9;
                    if (!exempt) {
                        if ((p.ip || 0) === 0) d++; else m++;
                    }

                    let group = null;
                    if (rNum >= 9) group = 'hc';
                    else if (rNum >= 6) group = 'cmd';
                    else if (rNum === 4 || rNum === 5 || (rNum === 3 && rStr.includes('prob'))) group = 'spv';
                    else if (rNum === 2 || rNum === 3) group = 'staff';
                    else if (rNum === 1) group = 'intern';

                    if (group) {
                        rs[group].t++;
                        if (isActive) rs[group].a++;
                    }
                });
                setStats({ total: members.length, active: a, inactive: i, disciplined: d, melanggar: m });
                setRankStats(rs);

                const syncData = async () => {
                    if (activeWeek && isLoggedIn) {
                        const { error } = await sb.from('san_sessions').upsert({ week_name: activeWeek, members: members }, { onConflict: 'week_name' });
                        if (error) console.error("Sync Error:", error);
                    }
                };
                syncData();
            }, [members, activeWeek, isLoggedIn, activeScreen]);

            // Charts
            useEffect(() => {
                if (!isLoggedIn || stats.total === 0) return;

                const createChart = (id, type, data, colors, isPie = true) => {
                    const ctx = document.getElementById(id);
                    if (!ctx) return;
                    const canvasCtx = ctx.getContext('2d');

                    if (chartRefs.current[id]) chartRefs.current[id].destroy();

                    const createGradients = (colors) => {
                        return colors.map(color => {
                            const g = canvasCtx.createLinearGradient(0, 0, 0, 400);
                            g.addColorStop(0, color);
                            g.addColorStop(1, color + '22'); // Fade to 15% opacity
                            return g;
                        });
                    };

                    const backgroundData = isPie ? colors : createGradients(colors);

                    const datasets = data.datasets ? data.datasets.map((ds, idx) => ({
                        label: ds.label,
                        data: ds.data,
                        backgroundColor: Array.isArray(ds.colors) ? ds.colors : createGradients([ds.colors || colors[idx % colors.length]])[0],
                        borderRadius: 8,
                        barThickness: 12,
                        borderWidth: 0,
                    })) : [{
                        label: 'Activity',
                        data: data.values,
                        backgroundColor: backgroundData,
                        hoverBackgroundColor: colors,
                        borderRadius: isPie ? 0 : 20,
                        borderWidth: isPie ? 14 : 0,
                        borderColor: '#ffffff',
                        cutout: isPie ? '85%' : undefined,
                        spacing: isPie ? 4 : 0,
                        barThickness: isPie ? undefined : 24,
                        hoverOffset: isPie ? 15 : 0,
                    }];

                    chartRefs.current[id] = new Chart(ctx, {
                        type,
                        data: {
                            labels: data.labels,
                            datasets: datasets
                        },
                        options: {
                            indexAxis: data.indexAxis || 'x',
                            responsive: true, maintainAspectRatio: false,
                            layout: { padding: { top: 20, bottom: 20, left: 10, right: 30 } },
                            animation: {
                                duration: 2500,
                                easing: 'easeOutQuart'
                            },
                            plugins: {
                                legend: {
                                    display: isPie || data.datasets,
                                    position: 'bottom',
                                    labels: {
                                        boxWidth: 8,
                                        boxHeight: 8,
                                        usePointStyle: true,
                                        padding: 25,
                                        font: { size: 10, weight: '700', family: "'Inter'" },
                                        color: '#64748b'
                                    }
                                },
                                tooltip: {
                                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                                    backdropFilter: 'blur(12px)',
                                    padding: 20,
                                    titleFont: { size: 14, weight: '800', family: "'Outfit'" },
                                    bodyFont: { size: 13, weight: '600', family: "'Inter'" },
                                    cornerRadius: 24,
                                    displayColors: true,
                                    boxPadding: 10,
                                    borderColor: 'rgba(255,255,255,0.1)',
                                    borderWidth: 1,
                                    callbacks: {
                                        label: (context) => {
                                            if (context.chart.canvas.id === 'chart4') {
                                                return ` ${context.dataset.label}: ${context.parsed.x} Personnel`;
                                            }
                                            return ` ${context.parsed.y || context.parsed} Menit`;
                                        }
                                    }
                                }
                            },
                            scales: isPie ? {} : {
                                y: {
                                    stacked: true,
                                    grid: { display: false },
                                    ticks: { color: '#64748b', font: { size: 10, weight: '800' }, padding: 10 }
                                },
                                x: {
                                    stacked: true,
                                    beginAtZero: true,
                                    grid: { color: 'rgba(241, 245, 249, 0.5)', drawBorder: false },
                                    ticks: { color: '#94a3b8', font: { size: 10, weight: '700' }, padding: 10 }
                                }
                            }
                        }
                    });
                };

                // Premium Color Palettes
                const palette1 = ['#6366f1', '#f43f5e']; // Indigo & Rose
                const palette2 = ['#10b981', '#f59e0b']; // Emerald & Amber
                const palette3 = ['#6366f1', '#818cf8', '#c7d2fe']; // Blue Tones

                createChart('chart1', 'doughnut', { labels: ['Aktif', 'Inaktif'], values: [stats.active, stats.inactive] }, palette1);
                createChart('chart2', 'doughnut', { labels: ['Disiplin', 'Melanggar'], values: [stats.disciplined, stats.melanggar] }, palette2);
                createChart('chart3', 'bar', { labels: topDuty.map(t => (t.name || '').split(' ')[0]), values: topDuty.map(t => t.currentDuty || 0) }, palette3, false);

                createChart('chart3', 'bar', { labels: topDuty.map(t => (t.name || '').split(' ')[0]), values: topDuty.map(t => t.currentDuty || 0) }, palette3, false);
            }, [stats, topDuty, isLoggedIn, activeScreen, rankStats]);

            // --- Handlers ---
            const showToast = (msg, type = 'success') => { setToast({ msg, type }); setTimeout(() => setToast(null), 3000); };

            const handleLogin = async (e) => {
                e.preventDefault();
                const { error } = await sb.auth.signInWithPassword({
                    email: loginEmail,
                    password: loginPass
                });
                if (error) showToast("Akses Ditolak: " + error.message, "error");
                else showToast("Login Berhasil");
            };

            const handleLogout = async () => { await sb.auth.signOut(); };

            const handleFileUpload = (type, e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });

                    if (type === 'members') {
                        const h = Object.keys(json[0] || {});
                        const bK = h.find(k => /badge/i.test(k)) || h[0];
                        const nK = h.find(k => /name|nama/i.test(k)) || h[1];
                        const rK = h.find(k => /rank|pangkat/i.test(k)) || h[2];
                        const list = json.map(r => ({ badge: r[bK], name: r[nK], rank: r[rK], ip: 0, currentDuty: 0 })).filter(m => m.name);
                        setMembers(list);
                        if (!savedWeeks.includes(targetWeek)) {
                            const newW = [...savedWeeks, targetWeek].sort();
                            setSavedWeeks(newW); localStorage.setItem('san_weeks', JSON.stringify(newW));
                        }
                        setActiveWeek(targetWeek);
                        showToast("Data Member Diimpor");
                    } else {
                        if (members.length === 0) return showToast("Upload Members Dulu", "error");
                        const h = Object.keys(json[0] || {});
                        const nK = h.find(k => /personnel|nama/i.test(k)) || h[0];
                        const dK = h.find(k => /duty/i.test(k)) || h[2];
                        const map = {};
                        json.forEach(r => {
                            const n = (r[nK] || '').toString().toLowerCase().trim();
                            const d = parseInt((r[dK] || '0').toString().replace(/\D/g, '')) || 0;
                            if (n) map[n] = (map[n] || 0) + d;
                        });
                        setMembers(prev => prev.map(m => {
                            const d = map[m.name.toLowerCase().trim()] || 0;
                            const exempt = m.rank && (m.rank.includes('[9]') || m.rank.includes('[10]'));
                            return { ...m, currentDuty: d, ip: (d < 200 && !exempt) ? (m.ip || 0) + 1 : m.ip };
                        }));
                        showToast("Aktivitas Berhasil Diproses");
                    }
                    e.target.value = null;
                };
                reader.readAsArrayBuffer(file);
            };

            const filteredMembers = useMemo(() => {
                let list = members.filter(m => (m.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || (m.badge || '').toLowerCase().includes(searchTerm.toLowerCase()));
                list.sort((a, b) => {
                    let vA = a[sort.key], vB = b[sort.key];
                    if (sort.key === 'rank') {
                        const getNum = s => parseInt((s || '').match(/\d+/)?.[0] || 0);
                        vA = getNum(vA); vB = getNum(vB);
                    } else if (typeof vA === 'string') {
                        vA = vA.toLowerCase();
                        vB = vB.toLowerCase();
                    }
                    if (vA === vB) return 0;
                    return sort.dir === 'asc' ? (vA < vB ? -1 : 1) : (vA < vB ? 1 : -1);
                });
                return list;
            }, [members, searchTerm, sort]);

            // --- Templates ---
            if (!isLoggedIn) return (
                <div className="min-h-screen bg-[#020617] flex items-center justify-center p-6 relative overflow-hidden font-['Inter']">
                    {/* Dynamic Background Elements */}
                    <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-600/20 blur-[120px] rounded-full animate-pulse-slow"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[120px] rounded-full animate-pulse-slow" style={{ animationDelay: '1.5s' }}></div>

                    <div className="w-full max-w-[480px] relative z-10">
                        <div className="bg-slate-900/40 backdrop-blur-3xl border border-white/10 rounded-[48px] p-10 md:p-14 shadow-[0_32px_64px_-16px_rgba(0,0,0,0.5)] overflow-hidden group">
                            {/* Accent Line */}
                            <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-transparent via-indigo-500 to-transparent opacity-50"></div>

                            <div className="text-center mb-12">
                                <div className="flex justify-center mb-8">
                                    <div className="w-28 h-28 relative">
                                        <div className="absolute inset-0 bg-indigo-500/20 blur-2xl rounded-full animate-pulse"></div>
                                        <img src="https://i.imgur.com/hHQgKs9.png" className="w-full h-full object-contain relative z-10 hover:scale-110 transition-transform duration-500" alt="Logo" />
                                    </div>
                                </div>
                                <h1 className="text-3xl font-black text-white mb-3 font-['Outfit'] tracking-tight">IA Portal</h1>
                                <p className="text-slate-400 text-sm font-medium tracking-wide">Enter your credentials to access the terminal</p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-6">
                                <div className="space-y-2.5">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Authentication ID</label>
                                    <div className="relative group/input">
                                        <div className="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-500 group-focus-within/input:text-indigo-400 transition-colors">
                                            <Icon name="shield-check" className="w-5 h-5" />
                                        </div>
                                        <input
                                            type="email"
                                            value={loginEmail}
                                            onChange={e => setLoginEmail(e.target.value)}
                                            className="w-full bg-black/20 border border-white/5 rounded-2xl py-4.5 pl-14 pr-6 text-white placeholder-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all text-sm font-semibold"
                                            placeholder="admin@san.ia"
                                            required
                                        />
                                    </div>
                                </div>

                                <div className="space-y-2.5">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Security Key</label>
                                    <div className="relative group/input">
                                        <div className="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-500 group-focus-within/input:text-indigo-400 transition-colors">
                                            <Icon name="lock" className="w-5 h-5" />
                                        </div>
                                        <input
                                            type="password"
                                            value={loginPass}
                                            onChange={e => setLoginPass(e.target.value)}
                                            className="w-full bg-black/20 border border-white/5 rounded-2xl py-4.5 pl-14 pr-6 text-white placeholder-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all font-mono tracking-[0.4em]"
                                            placeholder="••••••••"
                                            required
                                        />
                                    </div>
                                </div>

                                <button className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-5 rounded-2xl shadow-xl shadow-indigo-900/40 active:scale-[0.98] transition-all flex items-center justify-center gap-3 overflow-hidden group relative">
                                    <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
                                    <span className="relative z-10 tracking-[3px] uppercase text-xs">Authorize Access</span>
                                    <Icon name="chevron-right" className="w-5 h-5 relative z-10 group-hover:translate-x-1 transition-transform" />
                                </button>
                            </form>

                            {toast && toast.type === 'error' && (
                                <div className="mt-8 bg-rose-500/10 border border-rose-500/20 rounded-2xl p-5 flex items-center gap-4 text-rose-400 text-sm animate-shake">
                                    <div className="w-10 h-10 rounded-xl bg-rose-500/20 flex items-center justify-center flex-shrink-0">
                                        <Icon name="alert-triangle" className="w-5 h-5" />
                                    </div>
                                    <span className="font-bold tracking-tight">{toast.msg}</span>
                                </div>
                            )}
                        </div>
                        <div className="flex flex-col items-center mt-12 space-y-4">
                            <p className="text-slate-600 text-[10px] font-black tracking-[3px] uppercase opacity-50">&copy; 2026 Internal Affairs Division</p>
                            <div className="flex gap-4">
                                <div className="w-1.5 h-1.5 rounded-full bg-slate-800"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-slate-800"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-slate-800"></div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex min-h-screen bg-[#f1f5f9] text-slate-800 font-['Inter'] relative">
                    {/* Mobile Overlay */}
                    {isMobileMenuOpen && (
                        <div onClick={() => setIsMobileMenuOpen(false)} className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[55] lg:hidden transition-opacity"></div>
                    )}

                    {/* Glass Sidebar */}
                    <aside className={`w-80 h-screen fixed top-0 left-0 bg-white border-r border-slate-200/60 p-8 flex flex-col z-[60] transition-transform duration-300 lg:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="flex items-center justify-between mb-12 px-2">
                            <div className="flex items-center gap-3">
                                <div className="w-12 h-12 flex items-center justify-center">
                                    <img src="https://i.imgur.com/hHQgKs9.png" className="w-full h-full object-contain" alt="Logo" />
                                </div>
                                <span className="text-xl font-black font-['Outfit'] tracking-tighter text-slate-900 leading-tight">SAN Internal Affairs</span>
                            </div>
                            <button onClick={() => setIsMobileMenuOpen(false)} className="lg:hidden p-2 text-slate-400 hover:text-slate-600">
                                <Icon name="x" className="w-6 h-6" />
                            </button>
                        </div>

                        <div className="flex-1 space-y-10 overflow-y-auto no-scrollbar pb-8">
                            {/* Refined Controls */}
                            <div className="pt-4 border-t border-slate-50">
                                <div className="space-y-6 px-2">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1.5">
                                            <label className="text-[9px] font-bold text-slate-400 uppercase ml-1">Bulan</label>
                                            <select value={calMonth} onChange={e => setCalMonth(Number(e.target.value))} className="w-full bg-slate-50 border border-slate-100 rounded-xl h-10 px-3 text-[11px] font-bold text-slate-700 outline-none focus:bg-white focus:ring-4 focus:ring-indigo-500/5 transition-all">
                                                {['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'].map((m, i) => <option key={i} value={i}>{m}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[9px] font-bold text-slate-400 uppercase ml-1">Tahun</label>
                                            <select value={calYear} onChange={e => setCalYear(Number(e.target.value))} className="w-full bg-slate-50 border border-slate-100 rounded-xl h-10 px-3 text-[11px] font-bold text-slate-700 outline-none focus:bg-white focus:ring-4 focus:ring-indigo-500/5 transition-all">
                                                {[2025, 2026, 2027, 2028].map(y => <option key={y} value={y}>{y}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[9px] font-bold text-slate-400 uppercase ml-1">Pilih Sesi</label>
                                        <select value={targetWeek} onChange={e => setTargetWeek(e.target.value)} className="w-full bg-slate-50 border border-slate-100 rounded-xl h-11 px-4 text-[11px] font-bold text-slate-700 outline-none focus:bg-white focus:ring-4 focus:ring-indigo-500/5 transition-all">
                                            {availableWeeks.map(w => <option key={w} value={w}>{w}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>

                            {/* Minimal File Actions */}
                            <div className="pt-4 border-t border-slate-50">
                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-[1.5px] mb-6 px-4">Manajemen Data</div>
                                <div className="space-y-2 px-2">
                                    <label className="flex items-center gap-4 px-4 py-3.5 rounded-2xl hover:bg-emerald-50 text-slate-600 transition-all cursor-pointer group">
                                        <div className="w-9 h-9 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center group-hover:bg-emerald-600 group-hover:text-white group-hover:shadow-lg group-hover:shadow-emerald-200 transition-all">
                                            <Icon name="users" className="w-4.5 h-4.5" />
                                        </div>
                                        <span className="text-xs font-bold flex items-center gap-2">
                                            Impor Personnel
                                            <Icon name="file-down" className="w-3.5 h-3.5 opacity-40" />
                                        </span>
                                        <input type="file" className="hidden" accept=".xlsx" onChange={e => handleFileUpload('members', e)} />
                                    </label>
                                    <label className="flex items-center gap-4 px-4 py-3.5 rounded-2xl hover:bg-indigo-50 text-slate-600 transition-all cursor-pointer group">
                                        <div className="w-9 h-9 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white group-hover:shadow-lg group-hover:shadow-indigo-200 transition-all">
                                            <Icon name="activity" className="w-4.5 h-4.5" />
                                        </div>
                                        <span className="text-xs font-bold flex items-center gap-2">
                                            Sinkron Aktivitas
                                            <Icon name="file-up" className="w-3.5 h-3.5 opacity-40" />
                                        </span>
                                        <input type="file" className="hidden" accept=".xlsx" onChange={e => handleFileUpload('activity', e)} />
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div className="mt-8 pt-8 border-t border-slate-100">
                            <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 py-3 rounded-2xl bg-slate-50 hover:bg-red-50 text-slate-500 hover:text-red-500 font-bold text-xs transition-all group border border-slate-100 hover:border-red-100 uppercase tracking-widest">
                                <Icon name="power" className="w-4 h-4 group-hover:rotate-90 transition-transform" />
                                <span>KELUAR SESI</span>
                            </button>
                        </div>
                    </aside>

                    {/* Content Wrapper */}
                    <main className="lg:ml-80 flex-1 p-6 md:p-12 min-w-0 main-gradient">
                        {/* High-End Header */}
                        <header className="flex flex-col xl:flex-row xl:items-center justify-between mb-10 gap-6">
                            <div className="flex items-center justify-between xl:justify-start gap-4">
                                <button onClick={() => setIsMobileMenuOpen(true)} className="lg:hidden p-3 bg-white border border-slate-200 rounded-xl shadow-sm hover:bg-slate-50">
                                    <Icon name="menu" className="w-6 h-6 text-slate-600" />
                                </button>
                                <div className="space-y-1.5">
                                    <h1 className="text-3xl md:text-4xl font-extrabold text-slate-900 font-['Outfit'] tracking-tight group">
                                        Internal Affairs Dashboard
                                        <span className="inline-block ml-2 w-2 h-2 rounded-full bg-emerald-500 animate-pulse align-middle"></span>
                                    </h1>
                                    <div className="flex items-center gap-3">
                                        <div className="flex items-center gap-2.5 px-3.5 py-1.5 bg-slate-100/80 backdrop-blur-sm border border-slate-200 rounded-2xl">
                                            <Icon name="clock" className="w-3.5 h-3.5 text-slate-500" />
                                            <span className="text-[10px] font-bold text-slate-600 whitespace-nowrap uppercase tracking-wider">Periode: {activeWeek || 'Menunggu Sinkron...'}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-4">
                                <div className="relative group flex-1 sm:flex-none">
                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                                        <Icon name="search" className="w-5 h-5" />
                                    </div>
                                    <input
                                        type="text"
                                        placeholder="Cari personnel..."
                                        value={searchTerm}
                                        onChange={e => setSearchTerm(e.target.value)}
                                        className="w-full sm:w-64 md:w-72 bg-white border border-slate-200 rounded-2xl py-3 pl-12 pr-4 text-sm font-medium focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all shadow-sm"
                                    />
                                </div>

                                {savedWeeks.length > 0 && (
                                    <div className="relative">
                                        <select
                                            value={activeWeek}
                                            onChange={async (e) => {
                                                const val = e.target.value;
                                                setIsInitialLoading(true); // Temporary block sync
                                                setActiveWeek(val);
                                                const { data: session } = await sb.from('san_sessions').select('members').eq('week_name', val).single();
                                                if (session) setMembers(session.members || []);
                                                setIsInitialLoading(false);
                                            }}
                                            className="appearance-none bg-white border border-slate-200 rounded-2xl py-3 pl-5 pr-12 text-sm font-bold text-slate-700 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all shadow-sm cursor-pointer"
                                        >
                                            <option value="">Riwayat Log</option>
                                            {savedWeeks.map(w => <option key={w} value={w}>{w}</option>)}
                                        </select>
                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                            <Icon name="history" className="w-4 h-4" />
                                        </div>
                                    </div>
                                )}
                            </div>
                        </header>

                        <div className="fade-in space-y-12">
                            {/* Insane Stats Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                {[
                                    { l: 'Total Staff', v: stats.total, i: 'users-2', ic: 'text-indigo-600', bg: 'bg-indigo-50/50', trend: 'Live', color: '#6366f1' },
                                    { l: 'Aktif (≥200m)', v: stats.active, i: 'zap', ic: 'text-emerald-600', bg: 'bg-emerald-50/50', trend: `${stats.total > 0 ? Math.round((stats.active / stats.total) * 100) : 0}%`, color: '#10b981' },
                                    { l: 'Disiplin (0 IP)', v: stats.disciplined, i: 'shield-check', ic: 'text-sky-600', bg: 'bg-sky-50/50', trend: `${stats.total > 0 ? Math.round((stats.disciplined / stats.total) * 100) : 0}%`, color: '#0ea5e9' },
                                    { l: 'Melanggar (>0 IP)', v: stats.melanggar, i: 'alert-octagon', ic: 'text-rose-600', bg: 'bg-rose-50/50', trend: `${stats.total > 0 ? Math.round((stats.melanggar / stats.total) * 100) : 0}%`, color: '#f43f5e' }
                                ].map((s, i) => (
                                    <div key={i} className="stat-card">
                                        <div className="absolute -right-6 -top-6 opacity-[0.03] group-hover:opacity-[0.08] group-hover:scale-150 group-hover:rotate-12 transition-all duration-1000 pointer-events-none">
                                            <Icon name={s.i} className="w-48 h-48" />
                                        </div>
                                        <div className="flex items-center justify-between mb-6 relative z-10">
                                            <div className={`w-14 h-14 rounded-2xl ${s.bg} ${s.ic} flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-all duration-500 shadow-sm`}>
                                                <Icon name={s.i} className="w-7 h-7" />
                                            </div>
                                            <div className="flex flex-col items-end">
                                                <span className={`text-[10px] font-black px-2.5 py-1 rounded-lg ${i === 0 ? 'bg-indigo-50 text-indigo-600' : i === 3 ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'} uppercase tracking-wider`}>
                                                    {s.trend}
                                                </span>
                                            </div>
                                        </div>
                                        <div className="relative z-10">
                                            <p className="text-[11px] font-bold text-slate-400 uppercase tracking-[1.5px] mb-1.5">{s.l}</p>
                                            <div className="flex items-baseline gap-2">
                                                <h3 className="text-4xl font-black text-slate-900 group-hover:text-indigo-600 transition-colors font-['Outfit'] tabular-nums leading-none">{s.v}</h3>
                                                <span className="text-[10px] font-bold text-slate-400">Personnel</span>
                                            </div>
                                        </div>
                                        <div className="mt-8 flex items-center gap-2 relative z-10">
                                            <div className="flex-1 h-2 bg-slate-100/50 rounded-full overflow-hidden">
                                                <div
                                                    className="h-full rounded-full transition-all duration-1000 ease-out relative"
                                                    style={{
                                                        width: `${(s.v / (stats.total || 1)) * 100}%`,
                                                        backgroundColor: s.color,
                                                        boxShadow: `0 0 15px ${s.color}66`
                                                    }}
                                                >
                                                    <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent animate-[shimmer_2s_infinite]"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Modern Charts Frame */}
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-8 chart-container group relative">
                                    <div className="flex items-center justify-between mb-16">
                                        <div>
                                            <h3 className="text-2xl font-black font-['Outfit'] mb-2 text-slate-900 tracking-tight">Analitik Performa</h3>
                                            <p className="text-slate-400 text-[11px] font-bold tracking-[2px] uppercase opacity-80 flex items-center gap-2">
                                                <span className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                                                LIVE ACTIVITY TRACKING
                                            </p>
                                        </div>
                                        <div className="flex gap-3">
                                            <div className="px-5 py-3 bg-slate-50 rounded-2xl border border-slate-100 text-[11px] font-bold text-slate-500 flex items-center gap-3 transition-colors group-hover:bg-indigo-50 group-hover:border-indigo-100 group-hover:text-indigo-600">
                                                <Icon name="calendar" className="w-4 h-4" />
                                                {activeWeek || 'Session'}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-20 items-center">
                                        <div className="h-[340px] w-full relative group/chart">
                                            <div className="absolute inset-0 bg-indigo-500/5 blur-[80px] rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                                            {stats.total > 0 && (
                                                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none translate-y-[-10px] z-10">
                                                    <span className="text-5xl font-black text-indigo-600 font-['Outfit'] drop-shadow-[0_4px_12px_rgba(99,102,241,0.2)] leading-tight transition-transform group-hover/chart:scale-110 duration-500">{stats.active}</span>
                                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-[3px]">Aktif</span>
                                                </div>
                                            )}
                                            {stats.total > 0 ? <canvas id="chart1" className="chart-glow"></canvas> : <div className="h-full flex items-center justify-center text-slate-300 italic text-sm">Menunggu data staff...</div>}
                                        </div>
                                        <div className="h-[340px] w-full relative group/chart2">
                                            <div className="absolute inset-0 bg-emerald-500/5 blur-[80px] rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                                            {stats.total > 0 && (
                                                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none translate-y-[-10px] z-10">
                                                    <span className="text-5xl font-black text-emerald-600 font-['Outfit'] drop-shadow-[0_4px_12px_rgba(16,185,129,0.2)] leading-tight transition-transform group-hover/chart2:scale-110 duration-500">{stats.disciplined}</span>
                                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-[3px]">Disiplin</span>
                                                </div>
                                            )}
                                            {stats.total > 0 ? <canvas id="chart2" className="chart-glow"></canvas> : <div className="h-full flex items-center justify-center text-slate-300 italic text-sm">Menganalisis laporan...</div>}
                                        </div>
                                    </div>
                                </div>
                                <div className="lg:col-span-4 chart-container flex flex-col relative group">
                                    <div className="mb-12">
                                        <p className="text-slate-400 text-[11px] font-bold tracking-[2px] uppercase opacity-80 flex items-center gap-2">
                                            <Icon name="award" className="w-4 h-4 text-amber-500" />
                                            TOP PERFORMANCE
                                        </p>
                                    </div>
                                    <div className="flex-1 min-h-[300px] relative px-2">
                                        {stats.total > 0 ? <canvas id="chart3"></canvas> : <div className="h-full flex items-center justify-center text-slate-300 italic text-sm">Sedang memproses roster...</div>}
                                    </div>
                                    <div className="mt-10 pt-10 border-t border-slate-50 grid grid-cols-2 gap-6 relative z-10">
                                        {topDuty.slice(0, 2).map((t, i) => (
                                            <div key={i} className="flex items-center gap-4 group/item">
                                                <div className="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-slate-400 font-black text-sm group-hover/item:bg-indigo-600 group-hover/item:text-white transition-all">#{i + 1}</div>
                                                <div className="flex flex-col">
                                                    <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Top {i + 1}</span>
                                                    <span className="text-sm font-black text-slate-800 truncate group-hover/item:text-indigo-600 transition-colors">{t.name.split(' ')[0]}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>


                            {/* High-Performance Table */}
                            <div className="bg-white rounded-[40px] border border-slate-100 shadow-2xl shadow-slate-200/50 overflow-hidden font-['Inter']">
                                <div className="p-10 border-b border-slate-50 bg-slate-50/30 flex flex-col md:flex-row md:items-center justify-between gap-6">
                                    <div className="flex items-center gap-5">
                                        <div className="w-14 h-14 bg-indigo-600 text-white rounded-[20px] flex items-center justify-center shadow-lg shadow-indigo-200">
                                            <Icon name="database" className="w-7 h-7" />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold font-['Outfit'] tracking-tight text-slate-900">Database Personnel</h3>
                                            <div className="flex items-center gap-2 mt-0.5">
                                                <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                                                <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest leading-none">{filteredMembers.length} Personel Terdaftar</p>
                                            </div>
                                        </div>
                                    </div>
                                    <button
                                        onClick={() => {
                                            const ws = XLSX.utils.json_to_sheet(members);
                                            const wb = XLSX.utils.book_new();
                                            XLSX.utils.book_append_sheet(wb, ws, "Database");
                                            XLSX.writeFile(wb, `IA_Export_${activeWeek.replace(/\s/g, '_')}.xlsx`);
                                        }}
                                        className="btn-primary group !py-3.5 !px-8 !rounded-2xl"
                                    >
                                        <Icon name="download-cloud" className="w-5 h-5 group-hover:-translate-y-1 transition-transform" />
                                        <span className="text-[11px] tracking-[2px] font-bold uppercase">Export Roster</span>
                                    </button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50/80">
                                                {[
                                                    { l: 'Personnel', k: 'name' },
                                                    { l: 'Pangkat', k: 'rank' },
                                                    { l: 'Aktivitas', k: 'currentDuty' },
                                                    { l: 'Penalti IP', k: 'ip' },
                                                    { l: 'Manajemen', k: null }
                                                ].map((col, i) => (
                                                    <th key={i} onClick={() => col.k && setSort({ key: col.k, dir: sort.key === col.k && sort.dir === 'asc' ? 'desc' : 'asc' })} className="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-[3px] cursor-pointer hover:bg-white transition-all group first:pl-12 last:pr-12 relative">
                                                        <div className="flex items-center gap-3 relative z-10">
                                                            <span>{col.l}</span>
                                                            {col.k && (
                                                                <div className={`transition-all duration-300 ${sort.key === col.k ? 'opacity-100 text-indigo-600 scale-125' : 'opacity-0 translate-y-1 group-hover:opacity-100 group-hover:translate-y-0'}`}>
                                                                    <Icon name={sort.dir === 'asc' ? 'arrow-up-narrow-wide' : 'arrow-down-wide-narrow'} className="w-4 h-4" />
                                                                </div>
                                                            )}
                                                        </div>
                                                        {sort.key === col.k && <div className="absolute bottom-0 left-10 right-10 h-0.5 bg-indigo-500 rounded-full shadow-[0_-2px_8px_rgba(99,102,241,0.4)]"></div>}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {filteredMembers.map((m, idx) => (
                                                <tr key={idx} onClick={() => setSelectedMember(m)} className="hover:bg-slate-50/80 transition-all duration-300 group cursor-pointer">
                                                    <td className="px-10 py-6 first:pl-12">
                                                        <div className="flex flex-col">
                                                            <span className="text-sm font-bold text-slate-900 group-hover:text-indigo-600 transition-colors">{m.name}</span>
                                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Badge #{m.badge}</span>
                                                        </div>
                                                    </td>
                                                    <td className="px-10 py-6">
                                                        <span className="inline-flex px-3.5 py-1.5 rounded-xl text-[9px] font-black uppercase bg-white text-slate-600 border border-slate-200 shadow-sm group-hover:border-indigo-200 group-hover:text-indigo-600 transition-all">
                                                            {m.rank}
                                                        </span>
                                                    </td>
                                                    <td className="px-10 py-6">
                                                        {m.rank && (m.rank.includes('[9]') || m.rank.includes('[10]')) ? (
                                                            <div className="flex flex-col">
                                                                <div className="inline-flex items-center gap-2 px-3 py-1 rounded-xl font-bold text-[11px] bg-slate-100 text-slate-500 border border-slate-200/50 w-fit">
                                                                    <Icon name="shield-off" className="w-3.5 h-3.5" />
                                                                    Dikecualikan
                                                                </div>
                                                                <span className="text-[10px] font-bold text-slate-400 ml-1.5 mt-1">{m.currentDuty} Menit</span>
                                                            </div>
                                                        ) : (
                                                            <div className="flex flex-col gap-1.5">
                                                                <div className={`inline-flex items-center gap-2 px-3 py-1 rounded-xl font-bold text-[11px] w-fit ${m.currentDuty >= 200 ? 'bg-emerald-50 text-emerald-700' : 'bg-rose-50 text-rose-700'}`}>
                                                                    <div className={`w-1.5 h-1.5 rounded-full ${m.currentDuty >= 200 ? 'bg-emerald-500' : 'bg-rose-500 shadow-[0_0_12px_rgba(244,63,94,0.4)] animate-pulse'}`}></div>
                                                                    {m.currentDuty} Menit
                                                                </div>
                                                                <div className="w-24 h-1 bg-slate-100 rounded-full overflow-hidden">
                                                                    <div
                                                                        className={`h-full rounded-full transition-all duration-1000 ${m.currentDuty >= 200 ? 'bg-emerald-500' : 'bg-rose-500'}`}
                                                                        style={{ width: `${Math.min(100, (m.currentDuty / 200) * 100)}%` }}
                                                                    ></div>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="px-10 py-6">
                                                        <div className={`w-10 h-10 rounded-[14px] flex items-center justify-center text-[11px] font-black border-2 transition-all duration-300 ${m.ip >= 10 ? 'bg-rose-600 text-white border-rose-500 shadow-lg shadow-rose-200' : m.ip > 0 ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200'}`}>
                                                            {m.ip || 0}
                                                        </div>
                                                    </td>
                                                    <td className="px-10 py-6 last:pr-12">
                                                        <div className="flex items-center gap-3">
                                                            <button onClick={() => setMembers(prev => prev.map(p => p.name === m.name ? { ...p, ip: Math.max(0, (p.ip || 0) - 1) } : p))} className="w-9 h-9 rounded-xl bg-white border border-slate-200 hover:bg-emerald-500 hover:text-white hover:border-emerald-500 hover:shadow-lg hover:shadow-emerald-100 text-slate-400 transition-all flex items-center justify-center active:scale-95 group/btn">
                                                                <Icon name="minus-circle" className="w-5 h-5" />
                                                            </button>
                                                            <button onClick={() => setMembers(prev => prev.map(p => p.name === m.name ? { ...p, ip: (p.ip || 0) + 1 } : p))} className="w-9 h-9 rounded-xl bg-white border border-slate-200 hover:bg-rose-500 hover:text-white hover:border-rose-500 hover:shadow-lg hover:shadow-rose-100 text-slate-400 transition-all flex items-center justify-center active:scale-95 group/btn">
                                                                <Icon name="plus-circle" className="w-5 h-5" />
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Personnel Detail Modal */}
                    {selectedMember && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 sm:p-10">
                            <div className="absolute inset-0 bg-slate-950/60 backdrop-blur-xl animate-fade-in" onClick={() => setSelectedMember(null)}></div>
                            <div className="relative w-full max-w-5xl bg-slate-50 rounded-[50px] shadow-2xl overflow-hidden animate-slide-up border border-white/20">
                                <div className="p-10 md:p-14">
                                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-8 mb-14">
                                        <div className="flex items-center gap-6">
                                            <div className="w-16 h-16 rounded-[24px] bg-indigo-600 flex items-center justify-center text-white shadow-xl shadow-indigo-200">
                                                <Icon name="user" className="w-8 h-8" />
                                            </div>
                                            <div>
                                                <h2 className="text-3xl font-black text-slate-900 mb-1 font-['Outfit']">{selectedMember.name}</h2>
                                                <p className="text-slate-400 font-bold uppercase tracking-[2px] text-xs">Badge #{selectedMember.badge} • {selectedMember.rank}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setSelectedMember(null)} className="w-14 h-14 rounded-2xl bg-white border border-slate-200 flex items-center justify-center text-slate-400 hover:text-rose-500 hover:border-rose-100 transition-all hover:scale-110 active:scale-95 shadow-sm">
                                            <Icon name="x" className="w-6 h-6" />
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                        {[
                                            {
                                                l: 'Progres Aktivitas',
                                                v: `${selectedMember.currentDuty}m`,
                                                i: 'zap',
                                                ic: 'text-indigo-600',
                                                bg: 'bg-indigo-50/50',
                                                trend: `${Math.min(100, Math.round((selectedMember.currentDuty / 200) * 100))}%`,
                                                color: '#6366f1',
                                                val: Math.min(100, (selectedMember.currentDuty / 200) * 100)
                                            },
                                            {
                                                l: 'Status Disiplin',
                                                v: `${selectedMember.ip} IP`,
                                                i: 'shield-check',
                                                ic: selectedMember.ip === 0 ? 'text-emerald-600' : 'text-rose-600',
                                                bg: selectedMember.ip === 0 ? 'bg-emerald-50/50' : 'bg-rose-50/50',
                                                trend: selectedMember.ip === 0 ? 'SAFE' : 'VIOLATED',
                                                color: selectedMember.ip === 0 ? '#10b981' : '#f43f5e',
                                                val: selectedMember.ip === 0 ? 100 : 0
                                            },
                                            {
                                                l: 'Status Akun',
                                                v: selectedMember.currentDuty >= 200 ? 'Active' : 'Missing',
                                                i: 'activity',
                                                ic: selectedMember.currentDuty >= 200 ? 'text-sky-600' : 'text-amber-600',
                                                bg: selectedMember.currentDuty >= 200 ? 'bg-sky-50/50' : 'bg-amber-50/50',
                                                trend: selectedMember.currentDuty >= 200 ? 'VERIFIED' : 'PENDING',
                                                color: selectedMember.currentDuty >= 200 ? '#0ea5e9' : '#f59e0b',
                                                val: selectedMember.currentDuty >= 200 ? 100 : 50
                                            },
                                            {
                                                l: 'Hierarchy Level',
                                                v: (() => {
                                                    const rStr = (selectedMember.rank || '').toLowerCase();
                                                    const rNum = parseInt(rStr.match(/\d+/)?.[0] || 0);
                                                    if (rNum >= 9) return 'High Command';
                                                    if (rNum >= 6) return 'Command';
                                                    if (rNum === 4 || rNum === 5 || (rNum === 3 && rStr.includes('prob'))) return 'Supervisor';
                                                    if (rNum === 2 || rNum === 3) return 'Staff';
                                                    if (rNum === 1) return 'Internship';
                                                    return 'N/A';
                                                })(),
                                                i: 'layout-grid',
                                                ic: 'text-indigo-600',
                                                bg: 'bg-indigo-50/50',
                                                trend: 'ROSTER',
                                                color: '#6366f1',
                                                val: 100
                                            }
                                        ].map((s, i) => (
                                            <div key={i} className="stat-card bg-white shadow-xl shadow-slate-200/40">
                                                <div className="absolute -right-6 -top-6 opacity-[0.03] pointer-events-none">
                                                    <Icon name={s.i} className="w-48 h-48" />
                                                </div>
                                                <div className="flex items-center justify-between mb-6 relative z-10">
                                                    <div className={`w-14 h-14 rounded-2xl ${s.bg} ${s.ic} flex items-center justify-center shadow-sm`}>
                                                        <Icon name={s.i} className="w-7 h-7" />
                                                    </div>
                                                    <div className="flex flex-col items-end">
                                                        <span className={`text-[10px] font-black px-2.5 py-1 rounded-lg ${s.ic.includes('rose') ? 'bg-rose-100 text-rose-600' :
                                                            s.ic.includes('emerald') ? 'bg-emerald-100 text-emerald-600' :
                                                                s.ic.includes('amber') ? 'bg-amber-100 text-amber-600' :
                                                                    'bg-indigo-100 text-indigo-600'
                                                            } uppercase tracking-wider`}>
                                                            {s.trend}
                                                        </span>
                                                    </div>
                                                </div>
                                                <div className="relative z-10">
                                                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-[1.5px] mb-1.5">{s.l}</p>
                                                    <h3 className="text-3xl font-black text-slate-900 font-['Outfit'] tabular-nums leading-none">{s.v}</h3>
                                                </div>
                                                <div className="mt-8 flex items-center gap-2 relative z-10">
                                                    <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                        <div
                                                            className="h-full rounded-full transition-all duration-1000 ease-out"
                                                            style={{ width: `${s.val}%`, backgroundColor: s.color }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {toast && (
                        <div className="fixed bottom-12 right-12 z-[100] animate-bounce-in font-['Inter']">
                            <div className={`px-8 py-5 rounded-[24px] glass border shadow-2xl flex items-center gap-5 transition-all ${toast.type === 'error' ? 'bg-rose-500 text-white border-rose-400' : 'bg-slate-900 text-white border-slate-700'}`}>
                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${toast.type === 'error' ? 'bg-white/20' : 'bg-indigo-500 shadow-lg shadow-indigo-500/30'}`}>
                                    <Icon name={toast.type === 'error' ? 'alert-octagon' : 'info'} className="w-5 h-5" />
                                </div>
                                <div className="pr-4">
                                    <p className="text-[10px] font-black uppercase tracking-[2px] opacity-60 mb-0.5">{toast.type === 'error' ? 'Status Alert' : 'System Notice'}</p>
                                    <p className="text-sm font-bold tracking-tight">{toast.msg}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
